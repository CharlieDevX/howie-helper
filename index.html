<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#e8491d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Howie Helper" />
<title>Howie Helper</title>
<style>
  :root{
    --bg:#14110f; --panel:#211c19; --panel2:#2c2521; --line:#3a322c;
    --ink:#f4efe9; --muted:#a8998c; --accent:#e8491d; --accent2:#f3a712;
    --good:#3fb56b; --danger:#d6493a;
    --radius:14px; --tap:#3a322c;
    --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-t: env(safe-area-inset-top, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    font-size:17px; line-height:1.35; overscroll-behavior-y:none;
    -webkit-text-size-adjust:100%;
  }
  #app{max-width:560px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
  .hidden{display:none !important;}

  /* App bar */
  .bar{
    position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#1b1714,#1b1714ee);
    backdrop-filter:saturate(140%) blur(6px);
    padding:calc(var(--safe-t) + 10px) 14px 10px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;
  }
  .bar h1{font-size:18px;margin:0;font-weight:700;letter-spacing:.2px;flex:1;}
  .bar .sub{font-size:12px;color:var(--muted);font-weight:500;}
  .iconbtn{width:40px;height:40px;border-radius:10px;background:var(--panel2);display:flex;
    align-items:center;justify-content:center;font-size:19px;flex:none;position:relative;overflow:hidden;}
  .iconbtn:active{background:var(--tap);}
  .iconbtn .ic-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  /* Hold-to-reset: --danger fill charges up over 900ms while armed, snaps back on cancel */
  .reset-hold{touch-action:none;}
  .reset-hold .reset-g{position:relative;z-index:1;}
  .reset-hold .reset-fill{position:absolute;inset:0;background:var(--danger);
    transform:scaleY(0);transform-origin:bottom;opacity:.9;transition:transform 0s;}
  .reset-hold.arming .reset-fill{transform:scaleY(1);transition:transform 900ms linear;}

  main{flex:1;padding:14px;padding-bottom:calc(96px + var(--safe-b));}
  main.nofooter{padding-bottom:calc(20px + var(--safe-b));}

  /* ---------- Home screen (tool launcher) ---------- */
  .home-intro{color:var(--muted);font-size:13px;margin:2px 2px 14px;}
  .toolrow{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
  .toolrow:active{background:var(--panel2);}
  .toolrow.soon{opacity:.55;}
  .toolrow.soon:active{background:var(--panel);}
  .toolrow .ic{width:46px;height:46px;border-radius:12px;background:var(--panel2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:24px;flex:none;position:relative;overflow:hidden;}
  .toolrow .ic .ic-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .toolrow .meta{flex:1;min-width:0;}
  .toolrow .meta b{font-weight:700;font-size:16px;display:block;}
  .toolrow .meta small{color:var(--muted);font-size:12.5px;display:block;margin-top:2px;}
  .toolrow .right{flex:none;display:flex;align-items:center;gap:8px;}
  .toolrow .chev{color:var(--muted);font-size:20px;}
  .badge{font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    background:var(--panel2);border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-weight:700;}
  .home-settings{margin-top:18px;border-top:1px solid var(--line);padding-top:14px;}

  /* Overview header card */
  .metacard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;margin-bottom:14px;display:flex;gap:10px;}
  .metacard .fld{flex:1;}
  .metacard label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin-bottom:4px;}
  .metacard input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:9px 10px;font-size:15px;}
  @media (max-width: 420px){
    .metacard{flex-direction:column;}
  }

  /* Progress */
  .progress{margin-bottom:16px;}
  .progress .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
  .progress .row b{font-size:15px;}
  .progress .row span{color:var(--muted);font-size:13px;}
  .track{height:8px;background:var(--panel2);border-radius:6px;overflow:hidden;}
  .track>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--good));
    width:0;transition:width .25s ease;}

  /* Section + items */
  .section-h{display:flex;justify-content:space-between;align-items:baseline;
    margin:18px 2px 8px;}
  .section-h h2{font-size:14px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent2);margin:0;}
  .section-h .stsub{font-size:12px;color:var(--muted);}
  .list{display:flex;flex-direction:column;gap:8px;}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:13px 14px;display:flex;align-items:center;gap:12px;}
  .item:active{background:var(--panel2);}
  .item .thumb{width:44px;height:44px;border-radius:10px;overflow:hidden;position:relative;
    background:var(--panel2);border:1px solid var(--line);flex:none;}
  .item .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .item .thumb .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:var(--muted);font-weight:800;font-size:18px;text-transform:uppercase;}
  .item .thumb .badge-check{position:absolute;right:-3px;bottom:-3px;width:18px;height:18px;
    border-radius:50%;background:var(--good);color:var(--bg);display:flex;align-items:center;
    justify-content:center;font-size:11px;font-weight:800;border:2px solid var(--panel);}
  .item .nm{flex:1;min-width:0;}
  .item .nm b{font-weight:600;font-size:16px;display:block;}
  .item .nm small{color:var(--muted);font-size:12px;}
  .item .tot{text-align:right;flex:none;}
  .item .tot .v{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
  .item .tot .u{font-size:11px;color:var(--muted);display:block;margin-top:-2px;}
  .item .tot.empty .v{color:var(--muted);font-weight:600;}

  /* Footer action bar */
  .footer{position:fixed;left:0;right:0;bottom:0;z-index:20;
    padding:10px 14px calc(10px + var(--safe-b));
    background:linear-gradient(180deg,transparent,#14110f 22%);
    max-width:560px;margin:0 auto;}
  .footer:empty{display:none;}
  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    padding:15px;border-radius:13px;font-size:16px;font-weight:700;}
  .btn.primary{background:var(--accent);color:#fff;}
  .btn.primary:active{background:#c93c14;}
  .btn.ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line);}
  .btn.ghost:active{background:var(--tap);}
  .btn.good{background:var(--good);color:#06210f;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}
  .btn:disabled{opacity:.35;pointer-events:none;}

  /* Header rail toggle (count screen) */
  .iconbtn.on{background:var(--accent);color:#fff;}
  .iconbtn.off{color:var(--muted);}

  /* Item-jump photo rail */
  .rail{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;margin:0 -2px;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .rail::-webkit-scrollbar{display:none;}
  .railitem{flex:none;width:48px;height:48px;border-radius:12px;overflow:hidden;
    background:var(--panel2);border:1px solid var(--line);padding:0;position:relative;}
  .railitem img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;}
  .railitem .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:800;color:var(--muted);text-transform:uppercase;}
  .railitem.cur{box-shadow:0 0 0 2px var(--accent);border-color:var(--accent);}

  /* Count screen */
  .count-head{margin-bottom:6px;}
  .count-head h2{margin:0;font-size:24px;}
  .count-head .meth{color:var(--muted);font-size:13px;margin-top:2px;}
  .consts{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
  .chip{background:var(--panel2);border:1px solid var(--line);border-radius:999px;
    padding:5px 11px;font-size:12px;color:var(--muted);}
  .chip b{color:var(--ink);font-weight:600;}
  .helper{background:#241d10;border:1px solid #4a3a16;color:#e7c98f;border-radius:11px;
    padding:10px 12px;font-size:12.5px;line-height:1.5;margin:12px 0;}
  .helper b{color:#f3d9a3;}

  /* Big live total */
  .bigtot{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px;text-align:center;margin:14px 0;}
  .bigtot .lbl{font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
  .bigtot .v{font-size:52px;font-weight:800;line-height:1.05;margin-top:4px;font-variant-numeric:tabular-nums;}
  .bigtot .u{color:var(--muted);font-size:14px;}

  /* Number field (clicker + numpad) */
  .nf{margin:12px 0;}
  .nf .nflabel{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:7px;}
  .nf .nflabel b{font-size:15px;font-weight:600;}
  .nf .nflabel small{color:var(--muted);font-size:12px;}
  .nfctl{display:flex;align-items:stretch;gap:10px;}
  .nfbtn{flex:none;width:64px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);
    font-size:30px;font-weight:600;display:flex;align-items:center;justify-content:center;
    user-select:none;}
  .nfbtn:active{background:var(--accent);color:#fff;border-color:var(--accent);}
  .nfval{flex:1;border-radius:13px;background:var(--panel);border:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;min-height:64px;}
  .nfval .num{font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;}
  .nfval .tap{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .nfval:active{border-color:var(--accent2);}

  /* Numpad overlay */
  .overlay{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.55);
    display:flex;align-items:flex-end;justify-content:center;}
  .pad{width:100%;max-width:560px;background:var(--panel);border-top-left-radius:20px;
    border-top-right-radius:20px;padding:14px 14px calc(16px + var(--safe-b));
    box-shadow:0 -8px 40px rgba(0,0,0,.5);animation:slideup .18s ease;}
  @keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .pad .padhead{text-align:center;margin-bottom:8px;}
  .pad .padhead .l{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.6px;}
  .pad .padexpr{text-align:center;color:var(--muted);font-size:15px;min-height:20px;
    font-variant-numeric:tabular-nums;}
  .pad .paddisp{font-size:46px;font-weight:800;text-align:center;font-variant-numeric:tabular-nums;
    min-height:54px;line-height:1.1;}
  .pad .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:8px;}
  .pad .grid.calc{grid-template-columns:repeat(4,1fr);}
  .pad .grid.quick{grid-template-columns:repeat(3,1fr);margin-top:9px;}
  .key{padding:18px;border-radius:13px;background:var(--panel2);border:1px solid var(--line);
    font-size:24px;font-weight:600;display:flex;align-items:center;justify-content:center;}
  .key:active{background:var(--tap);}
  .key.wide{font-size:18px;}
  .key.done{background:var(--good);color:#06210f;}
  .key.clr{color:var(--accent2);}
  .key.op{color:var(--accent2);font-size:26px;}
  .key.qk{color:var(--accent2);font-size:19px;font-weight:700;}
  .key.qk.sub{color:var(--danger);}
  .key.qsign{font-size:22px;font-weight:700;}
  .key.qsign.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .key.ghost{background:none;border:none;pointer-events:none;}

  /* Settings */
  .set-item{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:12px;margin-bottom:10px;}
  .set-item .top{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
  .set-item .top input.nameinp{flex:1;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px;font-size:15px;font-weight:600;}
  .set-item .order{display:flex;gap:4px;}
  .miniicon{width:36px;height:36px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-size:15px;}
  .miniicon:active{background:var(--tap);}
  .miniicon.del{color:var(--danger);}
  .cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .cgrid .cf label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;}
  .cgrid .cf input{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:8px;font-size:14px;}
  .set-sec-h{display:flex;align-items:center;gap:8px;margin:18px 2px 8px;}
  .set-sec-h h2{font-size:14px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent2);margin:0;flex:1;}
  .addbtn{background:var(--panel2);border:1px dashed var(--line);border-radius:12px;padding:12px;
    width:100%;color:var(--muted);font-weight:600;font-size:14px;}
  .addbtn:active{background:var(--tap);}
  select.methsel{background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px;font-size:14px;}

  /* Global settings rows */
  .setcard{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:14px;margin-bottom:12px;}
  .setcard h3{margin:0 0 4px;font-size:15px;}
  .setcard p{margin:0 0 10px;color:var(--muted);font-size:12.5px;}
  .setcard input.txt{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:9px;padding:10px;font-size:15px;}
  .seg{display:flex;gap:8px;}
  .seg button{flex:1;padding:11px;border-radius:10px;background:var(--panel2);border:1px solid var(--line);
    color:var(--muted);font-weight:600;font-size:14px;}
  .seg button.on{background:var(--accent);border-color:var(--accent);color:#fff;}

  /* Summary */
  .sumrow{display:flex;justify-content:space-between;padding:11px 4px;border-bottom:1px solid var(--line);}
  .sumrow .nm{color:var(--ink);}
  .sumrow .nm small{color:var(--muted);display:block;font-size:11px;}
  .sumrow .v{font-weight:700;font-variant-numeric:tabular-nums;}
  .sumrow.sec{border:none;padding:14px 4px 4px;}
  .sumrow.sec b{color:var(--accent2);text-transform:uppercase;font-size:12px;letter-spacing:.6px;}
  .toast{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%);
    background:var(--good);color:#06210f;padding:10px 18px;border-radius:999px;font-weight:700;
    font-size:14px;z-index:60;box-shadow:0 6px 20px rgba(0,0,0,.4);}
  .danger-zone{margin-top:22px;}
  textarea.exp{width:100%;min-height:160px;background:var(--panel2);border:1px solid var(--line);
    color:var(--ink);border-radius:11px;padding:12px;font-family:ui-monospace,Menlo,monospace;font-size:13px;}
  .note{color:var(--muted);font-size:12.5px;margin:8px 2px;}

  /* Drawer Cash */
  .dc-mode{margin-bottom:14px;}
  .dc-mode .dc-modehint{color:var(--muted);font-size:12.5px;margin:8px 2px 0;}
  .dc-mode.open .seg button[data-v="open"].on{background:var(--good);border-color:var(--good);color:#06210f;}
  .dc-mode.close .seg button[data-v="close"].on{background:var(--danger);border-color:var(--danger);color:#fff;}
  .dc-setup{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:6px 12px 10px;margin-bottom:14px;}
  .dc-setup .nf{margin:8px 0;}
  .dc-sec{margin-top:8px;}
  .dc-sech{font-size:14px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent2);
    font-weight:700;margin:20px 2px 6px;}
  .dc-subtotal{display:flex;justify-content:space-between;align-items:center;
    color:var(--muted);font-size:13px;padding:10px 4px 2px;border-top:1px solid var(--line);margin-top:6px;}
  .dc-subtotal b{color:var(--ink);font-size:17px;font-variant-numeric:tabular-nums;}
  /* Receipt / export card */
  .dc-receipt{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 16px;margin-bottom:14px;overflow:hidden;position:relative;}
  .dc-receipt::before{content:"";position:absolute;top:0;left:0;right:0;height:5px;background:var(--accent);}
  .dc-rtitle{font-size:22px;font-weight:800;margin-top:4px;}
  .dc-rsub{color:var(--muted);font-size:12.5px;margin-top:2px;}
  .dc-rmode{display:inline-block;margin:10px 0 4px;font-size:11px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--panel2);border:1px solid var(--line);}
  .dc-rmode.open{color:var(--good);} .dc-rmode.close{color:var(--accent2);}
  .dc-rrow{display:flex;justify-content:space-between;align-items:center;padding:11px 2px;border-top:1px solid var(--line);}
  .dc-rrow span{color:var(--muted);font-size:14px;}
  .dc-rrow b{font-size:16px;font-variant-numeric:tabular-nums;}
  .dc-rrow.total span{color:var(--ink);font-weight:700;} .dc-rrow.total b{font-size:18px;}
  .dc-rresult{margin-top:14px;text-align:center;font-size:34px;font-weight:800;
    border:2px solid var(--line);border-radius:13px;padding:16px;background:#1b1613;}

  /* ===== Nightly Inventory export sheets (ported from locked mockups, scoped) ===== */
  /* Share-image preview overlay */
  .hhx-preview{max-height:52vh;overflow:auto;border:1px solid var(--line);border-radius:10px;background:#fff;}
  .hhx-preview img{width:100%;display:block;}

  /* Detailed / shareable sheet — branded red/gold (scoped under .hhx) */
  .hhx{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .hhx .page{width:8.5in;min-height:11in;margin:0;background:#fff;color:#1f1c1a;
    display:flex;flex-direction:column;overflow:hidden;}
  .hhx .head{background:#C8102E;padding:22px 30px;display:flex;align-items:center;justify-content:space-between;}
  .hhx .brand{display:flex;align-items:center;gap:14px;}
  .hhx .logo{width:46px;height:46px;border-radius:50%;background:#FFC72C;display:flex;
    align-items:center;justify-content:center;font-size:26px;}
  .hhx .brand .name{color:#fff;font-size:23px;font-weight:800;line-height:1.05;letter-spacing:.2px;}
  .hhx .brand .sub{color:#FFC72C;font-size:14px;font-weight:700;letter-spacing:.4px;}
  .hhx .head .meta{text-align:right;color:#fff;}
  .hhx .head .meta .d{font-size:17px;font-weight:700;}
  .hhx .head .meta .by{font-size:13px;color:#f6d9a0;}
  .hhx .strip{background:#FFF6E5;padding:9px 30px;display:flex;justify-content:space-between;
    font-size:12.5px;color:#6b5a2e;border-bottom:1px solid rgba(0,0,0,.06);}
  .hhx .body{padding:16px 30px 24px;flex:1;}
  .hhx .sec{margin-top:14px;}
  .hhx .sec:first-child{margin-top:4px;}
  .hhx .sec-h{color:#C8102E;font-size:13px;font-weight:800;letter-spacing:1px;
    border-bottom:2px solid #FFC72C;padding-bottom:5px;margin-bottom:9px;text-transform:uppercase;}
  .hhx .grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 26px;}
  .hhx .row{display:flex;align-items:center;gap:12px;padding:5px 0;}
  .hhx .thumb{width:46px;height:46px;border-radius:9px;background:#26211f;flex:none;overflow:hidden;
    display:flex;align-items:center;justify-content:center;border:1px solid rgba(0,0,0,.1);position:relative;}
  .hhx .thumb img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;}
  .hhx .thumb .ini{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    color:#FFC72C;font-weight:800;font-size:20px;text-transform:uppercase;}
  .hhx .nm{flex:1;font-size:14.5px;color:#222;}
  .hhx .val{font-size:15px;font-weight:800;color:#111;white-space:nowrap;}
  .hhx .val .u{color:#a0a0a0;font-weight:500;font-size:12px;margin-left:2px;}
  .hhx .row.uncounted .nm{color:#b3b3b3;}
  .hhx .row.uncounted .val{color:#c2c2c2;font-weight:600;}
  .hhx .row.uncounted .thumb{opacity:.35;}
  .hhx .foot{background:#1a1a1a;color:#cfcfcf;font-size:11px;padding:10px 30px;
    display:flex;justify-content:space-between;}

  /* Printable ledger sheet — black ink (scoped under .hhp) */
  .hhp{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .hhp .page{width:8.5in;min-height:11in;margin:0;background:#fff;color:#111;
    padding:0.5in 0.6in;display:flex;flex-direction:column;}
  .hhp .head{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:2px solid #111;padding-bottom:8px;}
  .hhp .title{font-size:20px;font-weight:800;letter-spacing:.2px;}
  .hhp .title .sub{font-size:12px;font-weight:600;color:#444;letter-spacing:1px;
    text-transform:uppercase;display:block;margin-top:2px;}
  .hhp .head .meta{text-align:right;font-size:12px;line-height:1.5;}
  .hhp .head .meta b{font-size:13px;}
  .hhp .barline{display:flex;justify-content:space-between;font-size:11px;color:#555;margin:6px 0 4px;}
  .hhp .list{flex:1;}
  .hhp .sec-h{font-size:11.5px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
    margin:10px 0 2px;padding-bottom:2px;border-bottom:1px solid #111;}
  .hhp .row{display:flex;align-items:baseline;font-size:13px;padding:3px 2px;border-bottom:1px dotted #c8c8c8;}
  .hhp .row .nm{flex:none;}
  .hhp .row .dots{flex:1;border-bottom:1px dotted #d9d9d9;margin:0 6px 3px;}
  .hhp .row .val{flex:none;font-weight:700;font-variant-numeric:tabular-nums;}
  .hhp .row .val .u{font-weight:400;color:#777;font-size:11px;margin-left:3px;}
  .hhp .row.uncounted .nm{color:#999;}
  .hhp .row.uncounted .val{color:#bbb;}
  .hhp .foot{font-size:10px;color:#777;border-top:1px solid #111;padding-top:6px;
    margin-top:8px;display:flex;justify-content:space-between;}

  /* Off-screen render host for html2canvas capture */
  #hhRenderHost{position:absolute;left:-10000px;top:0;}
  /* Printable host hidden on screen; revealed only while printing the ledger */
  #hhPrintHost{display:none;}

  @media print{
    @page{size:letter;margin:0.5in 0.6in;}
    body.hh-printing #app,body.hh-printing #overlayRoot,body.hh-printing #toastRoot,
    body.hh-printing #hhRenderHost{display:none !important;}
    body.hh-printing{background:#fff;}
    body.hh-printing #hhPrintHost{display:block !important;position:static;left:auto;}
    body.hh-printing #hhPrintHost .page{box-shadow:none;width:auto;min-height:auto;margin:0;padding:0;}
    body.hh-printing #hhPrintHost .list,body.hh-printing #hhPrintHost .sec-h,
    body.hh-printing #hhPrintHost .row{page-break-inside:avoid;}
  }
</style>

<body>
<div id="app">
  <div class="bar" id="bar"></div>
  <main id="view"></main>
  <div class="footer" id="footer"></div>
</div>
<div id="overlayRoot"></div>
<div id="toastRoot"></div>

<!-- Vendored, offline (no runtime CDN): on-device image/PDF export rendering -->
<script src="vendor/html2canvas.min.js"></script>
<script src="vendor/jspdf.umd.min.js"></script>
<script>
"use strict";
(function(){

/* ====================================================================
   Howie Helper — app shell + tools
   Single-file PWA, phone-first, offline, all data on-device.
   The home screen launches tools from a registry; the Nightly Inventory
   tool is the ported prototype (logic + cooler presets unchanged).
   ==================================================================== */

const elView=document.getElementById("view");
const elBar=document.getElementById("bar");
const elFooter=document.getElementById("footer");
const elMain=elView; // alias

/* ---------------- shared helpers ---------------- */
function uid(){ return "i" + Math.abs(hashStr(Date_now_safe() + ":" + counterTick())).toString(36); }
let _tick = 0;
function counterTick(){ return (_tick++); }
function Date_now_safe(){ return (typeof performance!=="undefined" && performance.now? Math.floor(performance.now()*1000): 0) + (new Date()).getTime(); }
function hashStr(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h*31 + s.charCodeAt(i))|0; } return h; }
function fmt(n){
  n=Number(n)||0;
  if(Math.abs(n-Math.round(n))<1e-9) return String(Math.round(n));
  return (Math.round(n*100)/100).toString();
}
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function slug(name){ return String(name==null?"":name).toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,""); }
function homeBtnHTML(id){ return `<button class="iconbtn" id="${id}" aria-label="Home"><span class="ic-emoji">🏠</span><img class="ic-img" src="img/home.png" alt="" onerror="this.remove()"></button>`; }
let toastT=null;
function toast(msg){
  const r=document.getElementById("toastRoot");
  r.innerHTML=`<div class="toast">${esc(msg)}</div>`;
  clearTimeout(toastT); toastT=setTimeout(()=>{ r.innerHTML=""; },1600);
}

/* ====================================================================
   SHELL
   ==================================================================== */
const SHELL_STORE = "howiehelper.shell.v1";

// Tool registry — single source of truth for the home screen.
// To add a tool later: add a row here, set status:"active", give it a render
// function in TOOL_VIEWS, and build the tool behind it. No home redesign needed.
const TOOLS = [
  { id:"nightlyInventory", name:"Nightly Inventory",      icon:"📋", status:"active", descriptor:"Fast nightly count → on-hand totals to key in" },
  { id:"prepBackup",       name:"Prep / Backup Tracker",  icon:"🧰", status:"soon",   descriptor:"Track prep & backups through the night" },
  { id:"doughBuild",       name:"Dough Build",            icon:"🍞", status:"soon",   descriptor:"How much dough to build to" },
  { id:"sheetOut",         name:"Sheet-out Projector",    icon:"📐", status:"soon",   descriptor:"Project skins/dough to sheet out" },
  { id:"drawerCash",       name:"Drawer Cash",            icon:"💵", status:"active", descriptor:"Count safe + drawer → balanced, over or short" },
  { id:"salesLabor",       name:"Sales / Labor Projections", icon:"📈", status:"soon", descriptor:"Data-driven sales & labor forecasts" },
  { id:"scheduleGen",      name:"Schedule Generator",     icon:"🗓️", status:"soon",  descriptor:"Build the staff schedule" },
];
function toolById(id){ return TOOLS.find(t=>t.id===id) || null; }

let shell = loadShell();
function loadShell(){
  let s=null;
  try{ s=JSON.parse(localStorage.getItem(SHELL_STORE)||"null"); }catch(e){ s=null; }
  if(!s) s={};
  if(typeof s.lastTool==="undefined") s.lastTool=null;
  if(s.landing!=="home" && s.landing!=="last") s.landing="last";
  if(typeof s.storeName!=="string") s.storeName="";
  return s;
}
function saveShell(){ try{ localStorage.setItem(SHELL_STORE, JSON.stringify(shell)); }catch(e){} }

// Top-level app view: "home" | "globalSettings" | "tool"
let appView="home";
let activeTool=null;

function renderApp(){
  if(appView==="tool" && activeTool && toolById(activeTool) && toolById(activeTool).status==="active"){
    TOOL_VIEWS[activeTool]();          // tool draws its own bar/view/footer
  } else if(appView==="globalSettings"){
    renderGlobalSettings();
  } else {
    appView="home";
    renderHome();
  }
}

function openHome(){ appView="home"; activeTool=null; renderApp(); window.scrollTo(0,0); }
function openTool(id){
  const t=toolById(id);
  if(!t || t.status!=="active"){ toast(t? t.name+" — not ready yet" : "Not ready yet"); return; }
  activeTool=id; appView="tool";
  shell.lastTool=id; saveShell();      // persist last-used for jump-to-last-used
  if(id==="nightlyInventory") Inv.reset();
  if(id==="drawerCash") DrawerCash.reset();
  renderApp(); window.scrollTo(0,0);
}

/* ---------- Home screen (tool launcher) ---------- */
function renderHome(){
  elBar.innerHTML = `<h1>Howie Helper</h1>`;
  let rows="";
  for(const t of TOOLS){
    const soon = t.status!=="active";
    rows += `
      <div class="toolrow ${soon?'soon':''}" data-id="${esc(t.id)}">
        <div class="ic"><span class="ic-emoji">${t.icon}</span>${t.status==="active"
            ? `<img class="ic-img" src="img/tool-${esc(t.id)}.png" alt="" onerror="this.remove()">` : ``}</div>
        <div class="meta"><b>${esc(t.name)}</b><small>${esc(t.descriptor)}</small></div>
        <div class="right">${ soon
            ? `<span class="badge">Coming soon</span>`
            : `<span class="chev">›</span>` }</div>
      </div>`;
  }
  elView.className="nofooter";
  elView.innerHTML = `
    <div class="home-intro">Store tools — pick one to get started.</div>
    ${rows}
    <div class="home-settings">
      <div class="toolrow" data-id="__settings">
        <div class="ic">⚙︎</div>
        <div class="meta"><b>Settings</b><small>Store name, default landing, app reset</small></div>
        <div class="right"><span class="chev">›</span></div>
      </div>
    </div>`;

  elView.querySelectorAll(".toolrow").forEach(el=>{
    const id=el.getAttribute("data-id");
    if(id==="__settings"){ el.onclick=()=>{ appView="globalSettings"; renderApp(); window.scrollTo(0,0); }; return; }
    const t=toolById(id);
    if(!t || t.status!=="active"){ el.onclick=()=>toast(t.name+" — coming soon"); return; }
    el.onclick=()=>openTool(id);
  });

  elFooter.innerHTML="";
}

/* ---------- Global settings ---------- */
function renderGlobalSettings(){
  elBar.innerHTML=`
    ${homeBtnHTML("ghome")}
    <h1>Settings <span class="sub">app-wide</span></h1>`;
  document.getElementById("ghome").onclick=openHome;

  elView.className="nofooter";
  elView.innerHTML=`
    <div class="setcard">
      <h3>Store name</h3>
      <p>Shown in the app for branding. Optional.</p>
      <input class="txt" id="setStore" type="text" placeholder="e.g. Howie's #84" value="${esc(shell.storeName||'')}">
    </div>
    <div class="setcard">
      <h3>On open</h3>
      <p>Where the app lands when you launch it.</p>
      <div class="seg" id="setLanding">
        <button data-v="last" class="${shell.landing==='last'?'on':''}">Last-used tool</button>
        <button data-v="home" class="${shell.landing==='home'?'on':''}">Home screen</button>
      </div>
    </div>
    <div class="setcard">
      <h3>Per-tool settings</h3>
      <p>Each tool has its own settings inside it — e.g. Nightly Inventory's item list, sections and constants live behind the gear in that tool.</p>
    </div>
    <div class="danger-zone">
      <button class="btn ghost" id="resetApp" style="color:var(--danger)">Reset app (erase all data)</button>
      <div class="note">Clears every tool's saved data on this device, including all inventory counts. Cannot be undone.</div>
    </div>`;

  document.getElementById("setStore").oninput=e=>{ shell.storeName=e.target.value; saveShell(); };
  elView.querySelectorAll("#setLanding button").forEach(b=>{
    b.onclick=()=>{ shell.landing=b.getAttribute("data-v"); saveShell(); renderGlobalSettings(); };
  });
  document.getElementById("resetApp").onclick=()=>{
    if(confirm("Reset the whole app? This erases ALL data on this device for every tool, including inventory counts. This cannot be undone.")){
      try{ localStorage.removeItem(SHELL_STORE); localStorage.removeItem(Inv.STORE); localStorage.removeItem(DrawerCash.STORE); }catch(e){}
      shell=loadShell(); Inv.reload(); DrawerCash.reload();
      toast("App reset"); openHome();
    }
  };

  elFooter.innerHTML="";
}

/* ====================================================================
   TOOL: Nightly Inventory  (ported prototype — logic & presets unchanged)
   Namespaced as `Inv` so the shell can drive it. Its internal router
   (overview / count / summary / settings) is preserved; the overview bar
   gains a Home control back to the launcher, and the gear opens this
   tool's per-tool settings.
   ==================================================================== */
const Inv = (function(){
  const STORE = "howiehelper.v1";
  const SECTIONS_DEFAULT = ["Pop","Cheese","Meats","Boxes"];

  const PAN_HELP = "Pan conversions: 5 lb bag = 3 × ⅙ pans · 12.5 lb pepperoni = 3 × ⅓ pans · Ham 18 lb box = 3 × 6 lb bags (1 bag = one ⅓ pan).";

  function defaultCatalog(){
    return {
      sections: SECTIONS_DEFAULT.slice(),
      items: [
        mk("Mozzarella","Cheese","weight",{boxLb:30,bagLb:5}),
        mk("Pepperoni","Meats","weight",{boxLb:null,bagLb:12.5}),
        mk("Sausage","Meats","weight",{boxLb:null,bagLb:5}),
        mk("Beef","Meats","weight",{boxLb:null,bagLb:5}),
        mk("Bacon","Meats","weight",{boxLb:null,bagLb:5}),
        mk("Grilled chicken","Meats","weight",{boxLb:null,bagLb:5}),
        mk("Ham","Meats","weight",{boxLb:18,bagLb:6}),
        mk("Pizza boxes (junior)","Boxes","box",{perUnfold:100,perFold:null}),
        mk("Pizza boxes (small)","Boxes","box",{perUnfold:100,perFold:null}),
        mk("Pizza boxes (medium)","Boxes","box",{perUnfold:100,perFold:15}),
        mk("Pizza boxes (large)","Boxes","box",{perUnfold:50,perFold:15}),
        mk("Pizza boxes (X-large)","Boxes","box",{perUnfold:50,perFold:null}),
        mk("Bread boxes","Boxes","box",{perUnfold:100,perFold:15}),
        mk("Deep Dish boxes","Boxes","box",{perUnfold:100,perFold:null}),
        mk("Water","Pop","pop",{perCrate:24,frontMax:7,frontPerType:7,backMax:7,backPerType:7}),
        mk("Gatorade","Pop","pop",{perCrate:24,frontMax:14,frontPerType:7,backMax:7,backPerType:7}),
        mk("2-liter bottles","Pop","pop",{perCrate:8,frontMax:10,frontPerType:5,backMax:5,backPerType:5}),
        mk("20oz bottles","Pop","pop",{perCrate:24,frontMax:7,frontPerType:7,backMax:7,backPerType:7}),
      ]
    };
    function mk(name,section,method,constants){
      return { id: uid(), name, section, method, constants };
    }
  }

  const METHOD_LABEL = { weight:"Weight (lb)", box:"Box stacks", pop:"Pop crates/rows" };
  const METHOD_UNIT  = { weight:"lb", box:"boxes", pop:"units" };

  function fieldsFor(item){
    const c = item.constants||{};
    if(item.method==="weight"){
      const f=[];
      if(c.boxLb!=null) f.push({key:"boxes",label:"Boxes",sub:c.boxLb+" lb ea",step:1,decimal:false});
      f.push({key:"bags",label:"Bags",sub:(c.bagLb!=null?c.bagLb+" lb ea":""),step:1,decimal:false});
      f.push({key:"onLineLb",label:"On-line lb",sub:"eye-weighed on make line",step:1,decimal:true});
      return f;
    }
    if(item.method==="box"){
      const f=[{key:"unfold",label:"Unfold stacks",sub:c.perUnfold+" / stack",step:1,decimal:false}];
      if(c.perFold!=null) f.push({key:"fold",label:"Fold stacks",sub:c.perFold+" / stack",step:1,decimal:false});
      f.push({key:"loose",label:"Loose",sub:"individual boxes",step:1,decimal:false});
      return f;
    }
    if(item.method==="pop"){
      const frontSub = c.frontPerType!=null ? ("up to "+c.frontPerType+" / type")
                     : (c.frontMax!=null ? "up to "+c.frontMax : "count bottles");
      const backSub  = c.backPerType!=null ? ("up to "+c.backPerType+" / type")
                     : "up to "+c.backMax;
      const f=[
        {key:"crates",label:"Crates",sub:(c.perCrate!=null? c.perCrate+" / crate":"full crates"),step:1,decimal:false},
        {key:"looseCrate",label:"Loose",sub:"bottles in opened crate",step:1,decimal:false},
        {key:"front",label:"Front (bottles)",sub:frontSub,step:1,decimal:false},
      ];
      if(c.backMax!=null) f.push({key:"back",label:"Back (bottles)",sub:backSub,step:1,decimal:false});
      return f;
    }
    return [];
  }

  function totalFor(item, counts){
    const c=item.constants||{}, q=counts||{};
    const n=k=>Number(q[k])||0;
    if(item.method==="weight"){
      return (c.boxLb!=null? n("boxes")*c.boxLb:0) + n("bags")*(c.bagLb||0) + n("onLineLb");
    }
    if(item.method==="box"){
      return n("unfold")*(c.perUnfold||0) + (c.perFold!=null? n("fold")*c.perFold:0) + n("loose");
    }
    if(item.method==="pop"){
      return n("crates")*(c.perCrate||0) + n("looseCrate") + n("front") + n("back");
    }
    return 0;
  }

  function constChips(item){
    const c=item.constants||{};
    if(item.method==="weight"){
      const a=[]; if(c.boxLb!=null)a.push(["Box",c.boxLb+" lb"]); if(c.bagLb!=null)a.push(["Bag",c.bagLb+" lb"]); return a;
    }
    if(item.method==="box"){
      const a=[["Unfold",c.perUnfold+"/stack"]]; if(c.perFold!=null)a.push(["Fold",c.perFold+"/stack"]); return a;
    }
    if(item.method==="pop"){
      const a=[]; if(c.perCrate!=null)a.push(["Crate",c.perCrate+"/ea"]);
      if(c.frontMax!=null)a.push(["Front max",String(c.frontMax)]);
      if(c.backMax!=null)a.push(["Back max",String(c.backMax)]);
      return a;
    }
    return [];
  }

  /* ---------------- State / persistence ---------------- */
  let state = load();
  function todayStr(){
    const d=new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function load(){
    let s=null;
    try{ s=JSON.parse(localStorage.getItem(STORE)||"null"); }catch(e){ s=null; }
    if(!s || !s.catalog){
      s = { catalog: defaultCatalog(), nights:{}, currentDate: todayStr() };
    }
    if(!s.currentDate) s.currentDate = todayStr();
    if(!s.nights) s.nights={};
    if(!s.nights[s.currentDate]) s.nights[s.currentDate]={ countedBy:"", counts:{}, counted:{} };
    if(typeof s.railShown === "undefined") s.railShown = true;
    if(typeof s.bigStep === "undefined") s.bigStep = false;
    migrate(s);
    return s;
  }
  function migrate(s){
    // Pop cooler layout: per-item front/back max, rows counted as bottles. Idempotent.
    if(!(s.catalog && Array.isArray(s.catalog.items) && (s.catalog.sections||[]).includes("Pop"))) return;
    const items = s.catalog.items;
    const have = name => items.some(i=>i.name===name);
    if(!have("Gatorade")) items.push({ id:uid(), name:"Gatorade", section:"Pop", method:"pop", constants:{} });
    if(!have("Water"))    items.push({ id:uid(), name:"Water",    section:"Pop", method:"pop", constants:{} });
    const COOLER = {
      "2-liter bottles": {perCrate:8,  frontMax:10, frontPerType:5, backMax:5,    backPerType:5},
      "20oz bottles":    {perCrate:24, frontMax:7,  frontPerType:7, backMax:7,    backPerType:7},
      "Gatorade":        {perCrate:24, frontMax:14, frontPerType:7, backMax:7,    backPerType:7},
      "Water":           {perCrate:24, frontMax:7,  frontPerType:7, backMax:7,    backPerType:7}
    };
    const POP_MIG = 5;
    const force = (s.popMig||0) < POP_MIG;
    for(const it of items){
      if(it.method!=="pop") continue;
      const c = it.constants || (it.constants={});
      const known = COOLER[it.name];
      if(known && force){
        Object.assign(c, known);
      } else if(c.frontMax===undefined){
        if(known){ Object.assign(c, known); if(c.perCrate==null) c.perCrate=known.perCrate; }
        else { c.frontMax = (c.perRow!=null? c.perRow : null); c.backMax = null; }
      }
      delete c.perRow;
    }
    if(force){
      const secs = s.catalog.sections, pi = secs.indexOf("Pop");
      if(pi>0){ secs.splice(pi,1); secs.unshift("Pop"); }
      const ORDER = ["Water","Gatorade","2-liter bottles","20oz bottles"];
      const rank = n => { const i=ORDER.indexOf(n); return i<0?99:i; };
      const pop = items.filter(i=>i.section==="Pop").sort((a,b)=>rank(a.name)-rank(b.name));
      const rest = items.filter(i=>i.section!=="Pop");
      s.catalog.items = rest.concat(pop);
    }
    s.popMig = POP_MIG;
  }
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }
  function night(){
    const d=state.currentDate;
    if(!state.nights[d]) state.nights[d]={ countedBy:"", counts:{}, counted:{} };
    return state.nights[d];
  }
  function countsOf(id){ const n=night(); if(!n.counts[id]) n.counts[id]={}; return n.counts[id]; }
  function isCounted(id){ return !!night().counted[id]; }

  /* ---------------- Internal router ---------------- */
  let route = { name:"overview", itemId:null };
  function go(name, itemId){ route={name, itemId:itemId||null}; render(); window.scrollTo(0,0); }
  function reset(){ route={name:"overview", itemId:null}; } // called when (re)entering the tool
  function reload(){ state=load(); route={name:"overview", itemId:null}; }

  function render(){
    if(route.name==="overview") renderOverview();
    else if(route.name==="count") renderCount();
    else if(route.name==="summary") renderSummary();
    else if(route.name==="settings") renderSettings();
  }

  /* ---------- Overview ---------- */
  function orderedItems(){
    const secOrder = state.catalog.sections;
    return state.catalog.items.slice().sort((a,b)=>{
      const sa=secOrder.indexOf(a.section), sb=secOrder.indexOf(b.section);
      if(sa!==sb) return sa-sb;
      return 0;
    });
  }
  function bySection(){
    const map={};
    for(const s of state.catalog.sections) map[s]=[];
    for(const it of state.catalog.items){ if(!map[it.section]) map[it.section]=[]; map[it.section].push(it); }
    return map;
  }

  function renderOverview(){
    const n=night();
    const items=state.catalog.items;
    const total=items.length;
    const done=items.filter(it=>isCounted(it.id)).length;
    const pct = total? Math.round(done/total*100):0;

    const sub = shell.storeName ? esc(shell.storeName) : "Inventory";
    elBar.innerHTML = `
      ${homeBtnHTML("navHome")}
      <h1>Nightly Inventory <span class="sub">${sub}</span></h1>
      <button class="iconbtn reset-hold" id="navReset" aria-label="Hold to reset counts"><span class="reset-fill"></span><span class="reset-g">↺</span></button>
      <button class="iconbtn" id="navSettings" aria-label="Tool settings">⚙︎</button>`;
    document.getElementById("navHome").onclick=openHome;
    document.getElementById("navSettings").onclick=()=>go("settings");

    // Reset icon — press-and-hold (~900ms) + confirm. A plain tap only hints.

    rBtn.addEventListener("pointerdown",(e)=>{
      e.preventDefault(); armed=false; rBtn.classList.add("arming");
      holdT=setTimeout(()=>{
        armed=true; clearHold();

          state.nights[state.currentDate]={countedBy:night().countedBy||"",counts:{},counted:{}};
          save(); toast("Counts reset"); renderOverview();

  /* ---------- Number field component ---------- */
  function numberFieldHTML(itemId,f){
    return `
    <div class="nf" data-key="${f.key}">
      <div class="nflabel"><b>${esc(f.label)}</b><small>${esc(f.sub||"")}</small></div>

  function wireNumberField(item,f){
    const root=elView.querySelector(`.nf[data-key="${f.key}"]`);
    const numEl=root.querySelector(".num");
    const q=countsOf(item.id);
    function cur(){ return Number(q[f.key])||0; }
    function set(v){
      if(v<0) v=0;
      if(!f.decimal) v=Math.round(v);
      else v=Math.round(v*100)/100;
      q[f.key]=v; save();
      numEl.textContent=fmt(v);
      refreshBigTotal(item);
    }
    numEl.textContent=fmt(cur());
    const step = state.bigStep ? (f.decimal ? 0.5 : 4) : f.step;
    root.querySelector(".minus").onclick=()=>set(cur()-step);
    root.querySelector(".plus").onclick=()=>set(cur()+step);
    attachRepeat(root.querySelector(".minus"),()=>set(cur()-step));
    attachRepeat(root.querySelector(".plus"),()=>set(cur()+step));
    root.querySelector(".nfval").onclick=()=>openNumpad(f.label, cur(), f.decimal, v=>set(v));
  }
  function attachRepeat(btn,fn){
    let t1=null,t2=null;
    const start=e=>{ t1=setTimeout(()=>{ t2=setInterval(fn,90); },420); };
    const stop=()=>{ clearTimeout(t1); clearInterval(t2); };
    btn.addEventListener("touchstart",start,{passive:true});
    btn.addEventListener("touchend",stop); btn.addEventListener("touchcancel",stop);
    btn.addEventListener("mousedown",start); btn.addEventListener("mouseup",stop); btn.addEventListener("mouseleave",stop);
  }

  /* ---------- Numpad overlay ---------- */
  const overlayRoot=document.getElementById("overlayRoot");
  // Calculator-style numpad: additive +/- entry with a live result and quick-add chips.
  function evalExpr(s){
    const toks = s.replace(/−/g,"-").match(/[+\-]|\d*\.?\d+/g) || [];
    let total=0, op="+";
    for(const t of toks){
      if(t==="+"||t==="-") op=t;
      else total = op==="+" ? total+parseFloat(t) : total-parseFloat(t);
    }
    return total;
  }
  function openNumpad(label, startVal, decimal, onDone){
    // Seed with the current value so the common case is "add to what's there".
    let expr = (startVal!=null && Number(startVal)!==0) ? String(startVal) : "";
    const cells = ["7","8","9","BSP","4","5","6","+","1","2","3","−","C","0",(decimal?".":"GHOST"),"DONE"];
    const labelOf={BSP:"⌫",DONE:"Done"};
    function clsOf(k){ return k==="C"||k==="BSP"?"clr" : (k==="+"||k==="−")?"op" : k==="DONE"?"done":""; }
    function keyHTML(k){ return k==="GHOST" ? `<span class="key ghost"></span>`
      : `<button class="key ${clsOf(k)}" data-k="${k}">${labelOf[k]||k}</button>`; }
    const quickVals = decimal ? [1,0.5] : [1,4];
    let qadd = true; // quick chips add (true) or subtract (false)
    overlayRoot.innerHTML=`
      <div class="overlay" id="ov">
        <div class="pad" id="pad">
          <div class="padhead"><div class="l">${esc(label)}</div></div>
          <div class="padexpr" id="expr"></div>
          <div class="paddisp" id="disp">0</div>
          <div class="grid calc">${cells.map(keyHTML).join("")}</div>
          <div class="grid quick">
            <button class="key qk" data-k="QADD:${quickVals[0]}"></button>
            <button class="key qk" data-k="QADD:${quickVals[1]}"></button>
            <button class="key qsign" data-k="QSIGN">±</button>
          </div>
        </div>
      </div>`;
    const dispEl=document.getElementById("disp"), exprEl=document.getElementById("expr");
    function renderQuick(){
      overlayRoot.querySelectorAll(".qk").forEach(b=>{
        const v=b.getAttribute("data-k").slice(5);
        b.textContent=(qadd?"+":"−")+v;
        b.classList.toggle("sub",!qadd);
      });
      const tog=overlayRoot.querySelector(".qsign");
      if(tog) tog.classList.toggle("on",!qadd);
    }
    const lastIsOp=()=>/[+−]$/.test(expr);
    function upd(){
      exprEl.textContent = expr.replace(/([+−])/g," $1 ").trim();
      dispEl.textContent = fmt(evalExpr(expr));
    }
    function addOp(k){ if(expr==="") expr="0"; if(lastIsOp()) expr=expr.slice(0,-1); expr+=k; upd(); }
    function press(k){
      if(k==="DONE"){ close(evalExpr(expr)); return; }
      if(k==="C"){ expr=""; upd(); return; }
      if(k==="BSP"){ expr=expr.slice(0,-1); upd(); return; }
      if(k==="QSIGN"){ qadd=!qadd; renderQuick(); return; }
      if(k.slice(0,5)==="QADD:"){ addOp(qadd?"+":"−"); expr+=k.slice(5); upd(); return; } // quick chip ±N
      if(k==="+"||k==="−"){ addOp(k); return; }
      if(k==="."){ const tail=expr.split(/[+−]/).pop(); if(tail.includes(".")) return; if(tail==="") expr+="0"; expr+="."; upd(); return; }
      expr+=k; upd(); // digit
    }
    overlayRoot.querySelectorAll(".key").forEach(b=>{ const k=b.getAttribute("data-k"); if(k) b.onclick=()=>press(k); });
    document.getElementById("ov").onclick=e=>{ if(e.target.id==="ov") close(evalExpr(expr)); };
    function close(v){ overlayRoot.innerHTML=""; onDone(isNaN(v)?0:v); }
    renderQuick(); upd();
  }

  /* ---------- Export sheets (detailed + printable, bound to live data) ---------- */
  function fmtDateLong(s){
    const d=new Date(String(s)+"T00:00");
    if(isNaN(d)) return String(s||"");
    return d.toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"});
  }
  function fmtStamp(){
    const d=new Date();
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
      + " · " + d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  }
  function expFilename(ext){ return "nightly-inventory-"+state.currentDate+"."+ext; }

  // Shared model: items grouped by section in entry order, with totals + completeness.
  function exportData(){
    const map=bySection(); const sections=[]; let done=0, total=0;
    for(const sec of state.catalog.sections){
      const list=map[sec]||[]; if(!list.length) continue;
      const items=list.map(it=>{
        const counted=isCounted(it.id); total++; if(counted) done++;
        return { name:it.name, slug:slug(it.name), counted,
          valueStr: counted? fmt(totalFor(it,countsOf(it.id))) : "—",
          unit: METHOD_UNIT[it.method]||"" };
      });
      sections.push({ name:sec, items });
    }
    return { storeName:shell.storeName||"", countedBy:night().countedBy||"",
      dateLong:fmtDateLong(state.currentDate), stamp:fmtStamp(), done, total, sections };
  }

  function waitForImages(node){
    const imgs=[...node.querySelectorAll("img")];
    const settle=img=> (img.complete) ? Promise.resolve()
      : new Promise(res=>{ img.addEventListener("load",res,{once:true}); img.addEventListener("error",res,{once:true}); });
    return Promise.race([
      Promise.all(imgs.map(settle)),
      new Promise(res=>setTimeout(res,4000))
    ]);
  }

  async function downloadOrShare(blob, ext){
    if(!blob){ toast("Could not create file"); return; }
    const name=expFilename(ext), type=blob.type||(ext==="pdf"?"application/pdf":"image/png");
    try{
      const file=new File([blob],name,{type});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"Nightly Inventory"}); return;
      }
    }catch(e){ /* fall through to download */ }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast(ext.toUpperCase()+" saved");
  }

  function savePdf(canvas){
    try{
      const { jsPDF }=window.jspdf;
      const pdf=new jsPDF({unit:"pt",format:"letter",orientation:"portrait"});
      const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
      let iw=pw, ih=pw*canvas.height/canvas.width;
      if(ih>ph){ ih=ph; iw=ph*canvas.width/canvas.height; }
      pdf.addImage(canvas.toDataURL("image/png"),"PNG",(pw-iw)/2,0,iw,ih);
      downloadOrShare(pdf.output("blob"),"pdf");
    }catch(e){ toast("Could not create PDF"); }
  }

            <button class="btn ghost" id="hhxClose">Close</button>
          </div>

  // Render the themed detailed sheet to a canvas on-device, then hand a PNG to the OS share sheet.
  async function shareImage(){
    const data=exportData();
    const host=document.createElement("div");
    host.id="hhRenderHost"; host.className="hhx";
    host.innerHTML=detailedSheetHTML(data);
    document.body.appendChild(host);
    let canvas;
    try{
      await waitForImages(host);
      canvas=await html2canvas(host.querySelector(".page"),
        {scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false});
    }catch(e){ host.remove(); toast("Could not create image"); return; }
    host.remove();
    const blob=await new Promise(r=>canvas.toBlob(r,"image/png"));
    if(blob){
      try{
        const file=new File([blob],expFilename("png"),{type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Nightly Inventory"}); return;
        }
      }catch(e){ /* cancelled/unsupported → show saveable preview below */ }
    }
    openExportPreview(canvas);
  }

  // Print only the minimal ledger via the browser print dialog (@page size:letter).
  function printSheet(){
    const host=document.createElement("div");
    host.id="hhPrintHost"; host.className="hhp";
    host.innerHTML=printableSheetHTML(exportData());
    document.body.appendChild(host);
    document.body.classList.add("hh-printing");
    let cleaned=false;
    const cleanup=()=>{ if(cleaned) return; cleaned=true;
      host.remove(); document.body.classList.remove("hh-printing");
      window.removeEventListener("afterprint",cleanup); };
    window.addEventListener("afterprint",cleanup);
    setTimeout(()=>{ try{ window.print(); }catch(e){} }, 60);
    setTimeout(cleanup, 60000); // safety net if afterprint never fires
  }

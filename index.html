      <table>
        <colgroup><col class="lbl"><col><col><col><col><col><col><col></colgroup>
        <thead><tr><th style="text-align:left">&nbsp;</th>${dayHeadHTML(d)}</tr></thead>
        <tbody>${body}</tbody>
      </table>
      <div class="ft">
        <span><b>Labor %</b> = Total Labor $ / Net Daily Sales</span>
        <span><b>Total Labor $</b> = Labor $ + Driver Comp $ + DD Drive $</span>
        <span><b>Door Dash $</b> = deliveries × $${money2(ddRate())}</span>
        <span><b>Shaded OTD/Late%</b> = missed goal</span>
      </div>
    </div>`;
  }

  async function downloadOrShare(blob, ext){
    if(!blob){ toast("Could not create file"); return; }
    const name=expName(ext), type=blob.type||(ext==="pdf"?"application/pdf":"image/png");
    try{
      const file=new File([blob],name,{type});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"Daily Numbers"}); return;
      }
    }catch(e){ /* fall through to download */ }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast(ext.toUpperCase()+" saved");
  }
  function savePdf(canvas){
    try{
      const { jsPDF }=window.jspdf;
      const pdf=new jsPDF({unit:"pt",format:"letter",orientation:"portrait"});
      const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
      let iw=pw, ih=pw*canvas.height/canvas.width;
      if(ih>ph){ ih=ph; iw=ph*canvas.width/canvas.height; }
      pdf.addImage(canvas.toDataURL("image/png"),"PNG",(pw-iw)/2,0,iw,ih);
      downloadOrShare(pdf.output("blob"),"pdf");
    }catch(e){ toast("Could not create PDF"); }
  }
  function openExportPreview(canvas){
    overlayRoot.innerHTML=`
      <div class="overlay" id="nnxOv">
        <div class="pad">
          <div class="padhead"><div class="l">Daily Numbers — Export</div></div>
          <div class="hhx-preview"><img src="${canvas.toDataURL("image/png")}" alt="Export preview"></div>
          <div class="btn-row" style="margin-top:12px">
            <button class="btn good" id="nnxPng">Save PNG</button>
            <button class="btn ghost" id="nnxPdf">Save PDF</button>
          </div>
          <div class="btn-row" style="margin-top:10px">
            <button class="btn ghost" id="nnxPrint">Print sheet</button>
            <button class="btn ghost" id="nnxClose">Close</button>
          </div>
        </div>
      </div>`;
    const close=()=>{ overlayRoot.innerHTML=""; };
    document.getElementById("nnxOv").onclick=e=>{ if(e.target.id==="nnxOv") close(); };
    document.getElementById("nnxClose").onclick=close;
    document.getElementById("nnxPng").onclick=()=>canvas.toBlob(b=>downloadOrShare(b,"png"),"image/png");
    document.getElementById("nnxPdf").onclick=()=>savePdf(canvas);
    document.getElementById("nnxPrint").onclick=()=>{ close(); printSheet(); };
  }
  async function shareImage(){
    overlayRoot.innerHTML="";                  // close chooser
    const host=document.createElement("div");
    host.className="nnx"; host.style.cssText="position:absolute;left:-10000px;top:0;";
    host.innerHTML=numbersShareableHTML(exportData());
    document.body.appendChild(host);
    let canvas;
    try{
      canvas=await html2canvas(host.querySelector(".page"),
        {scale:2, backgroundColor:"#ffffff", useCORS:true, logging:false});
    }catch(e){ host.remove(); toast("Could not create image"); return; }
    host.remove();
    const blob=await new Promise(r=>canvas.toBlob(r,"image/png"));
    if(blob){
      try{
        const file=new File([blob],expName("png"),{type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Daily Numbers"}); return;
        }
      }catch(e){ /* cancelled/unsupported → saveable preview */ }
    }
    openExportPreview(canvas);
  }
  function printSheet(){
    overlayRoot.innerHTML="";                  // close chooser
    const host=document.createElement("div");
    host.id="hhPrintHost"; host.className="nnp";   // reuse shared print host + @media print reveal
    host.innerHTML=numbersPrintableHTML(exportData());
    document.body.appendChild(host);
    document.body.classList.add("hh-printing");
    let cleaned=false;
    const cleanup=()=>{ if(cleaned) return; cleaned=true;
      host.remove(); document.body.classList.remove("hh-printing");
      window.removeEventListener("afterprint",cleanup); };
    window.addEventListener("afterprint",cleanup);
    setTimeout(()=>{ try{ window.print(); }catch(e){} }, 60);
    setTimeout(cleanup, 60000);
  }
  function openExportChooser(){
    overlayRoot.innerHTML=`
      <div class="overlay" id="nnExpOv">
        <div class="pad">
          <div class="padhead"><div class="l">Export · Week of ${esc(weekRangeLabel(state.currentWeek))}</div></div>
          <p class="nn-padp">Send the night's numbers to the group chat, or print / save a PDF.</p>
          <div class="btn-row"><button class="btn good" id="nnShareBtn">📷&nbsp; Shareable image</button></div>
          <div class="btn-row" style="margin-top:10px"><button class="btn ghost" id="nnPrintBtn">🖨&nbsp; Printable / PDF</button></div>
          <div class="btn-row" style="margin-top:10px"><button class="btn ghost" id="nnExpClose">Cancel</button></div>
        </div>
      </div>`;
    const close=()=>{ overlayRoot.innerHTML=""; };
    document.getElementById("nnExpOv").onclick=e=>{ if(e.target.id==="nnExpOv") close(); };
    document.getElementById("nnExpClose").onclick=close;
    document.getElementById("nnShareBtn").onclick=()=>shareImage();
    document.getElementById("nnPrintBtn").onclick=()=>printSheet();
  }

  /* ---------------- self-test (verifies calc engine vs. the mockups) ---------------- */
  function _selftest(){
    const saved={ weeks:state.weeks, currentWeek:state.currentWeek, storeNumber:state.storeNumber };
    try{
      loadDemoWeek();
      const approx=(a,b)=>Math.abs(a-b)<0.005;
      const checks=[
        ["salesToDate Mon", salesToDate(0), 660.76],
        ["salesToDate Tue", salesToDate(1), 2233.04],
        ["salesToDate Thu", salesToDate(3), 4517.62],
        ["totalLabor Mon",  totalLabor(getDay(0)), 234.98],
        ["totalLabor Wed",  totalLabor(getDay(2)), 314.03],
        ["tlToDate Tue",    totalLaborToDate(1), 542.36],
        ["tlToDate Thu",    totalLaborToDate(3), 1156.23],
        ["laborPct Mon",    laborPct(0), 35.56],
        ["laborPctTD Tue",  laborPctToDate(1), 24.29],
        ["laborPctTD Thu",  laborPctToDate(3), 25.59],
        ["cashToDate Tue",  cashToDate(1), 1.35],
        ["cashToDate Thu",  cashToDate(3), 3.01],
      ];
      let ok=true;
      for(const [name,got,exp] of checks){
        if(!approx(Math.round(got*100)/100, exp)){ ok=false; console.error(`Numbers calc FAIL: ${name} -> ${got}, expected ${exp}`); }
      }
      if(ok) console.log("Numbers calc self-test: "+checks.length+"/"+checks.length+" OK");
      return ok;
    } finally {
      state.weeks=saved.weeks; state.currentWeek=saved.currentWeek; state.storeNumber=saved.storeNumber;
    }
  }
  try{ _selftest(); }catch(e){}

  return { STORE, render, reset, reload, exportData, _selftest };
})();

/* ====================================================================
   DOUGH BUILD — morning "build-to" counter
   Persists only the per-size build-to target (trays). Trays-on-hand is
   live working state, never written to disk. needed = buildTo − onHand.
   ==================================================================== */
const DoughBuild = (function(){
  const STORE = "howiehelper.doughBuild.v1";
  // [code, chip, full name] — fixed order Jr → Xl.
  const SIZES = [["jr","Jr","Junior"],["sm","Sm","Small"],["md","Md","Medium"],
                 ["lg","Lg","Large"],["xl","Xl","X-Large"]];

  /* ---------- State + persistence ---------- */
  function blank(){ return {jr:0,sm:0,md:0,lg:0,xl:0}; }
  function load(){
    let s=null; try{ s=JSON.parse(localStorage.getItem(STORE)||"null"); }catch(e){ s=null; }
    const bt=blank();
    if(s && typeof s==="object" && s.buildTo && typeof s.buildTo==="object"){
      SIZES.forEach(([k])=>{ const v=Number(s.buildTo[k]); bt[k]=(isFinite(v)&&v>0)?Math.round(v*2)/2:0; });
    }
    return { buildTo: bt };
  }
  let state = load();
  let onHand = blank();                  // live only — never persisted, reset on reload/Clear
  // Persist ONLY the build-to targets. onHand is intentionally excluded.
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify({buildTo: state.buildTo})); }catch(e){} }

  /* ---------- Math + formatting ---------- */
  function clampHalf(v){ v=Math.round((Number(v)||0)*2)/2; return v<0?0:v; }
  function needed(k){ return (Number(state.buildTo[k])||0) - (Number(onHand[k])||0); } // can be negative
  function totalToBuild(){ let t=0; SIZES.forEach(([k])=>{ const n=needed(k); if(n>0) t+=n; }); return t; }
  function overCount(){ let c=0; SIZES.forEach(([k])=>{ if(needed(k)<-1e-9) c++; }); return c; }
  function hasAnyBuildTo(){ return SIZES.some(([k])=>(Number(state.buildTo[k])||0)>0); }
  // 2.5 → "2½", 3 → "3", 0.5 → "½", 0 → "0".
  function fmtHalf(n){
    n=Number(n)||0; const neg=n<0; n=Math.abs(n);
    const whole=Math.floor(n+1e-9), half=(n-whole)>=0.25;
    const s = half ? ((whole>0?String(whole):"")+"½") : String(whole);
    return (neg?"-":"")+s;
  }

  // Press-and-hold to repeat — mirror of Inv/DrawerCash (those copies are IIFE-private).
  function attachRepeat(btn,fn){
    let t1=null,t2=null;
    const start=()=>{ t1=setTimeout(()=>{ t2=setInterval(fn,90); },420); };
    const stop=()=>{ clearTimeout(t1); clearInterval(t2); };
    btn.addEventListener("touchstart",start,{passive:true});
    btn.addEventListener("touchend",stop); btn.addEventListener("touchcancel",stop);
    btn.addEventListener("mousedown",start); btn.addEventListener("mouseup",stop); btn.addEventListener("mouseleave",stop);
  }

  /* ---------- Router ---------- */
  let route={ name:"counter" };
  function go(name){ route={name}; render(); window.scrollTo(0,0); }
  function reset(){ route={name:"counter"}; }
  function reload(){ state=load(); onHand=blank(); route={name:"counter"}; }
  function render(){ if(route.name==="editor") renderEditor(); else renderCounter(); }

  /* ---------- Shared stepper markup (reuses .nf inventory stepper styles) ---------- */
  function stepperHTML(val, tap){
    return `
      <div class="nf">
        <div class="nfctl">
          <button class="nfbtn minus" aria-label="minus">−</button>
          <button class="nfval" aria-label="value"><span class="num">${esc(fmtHalf(val))}</span><span class="tap">${esc(tap)}</span></button>
          <button class="nfbtn plus" aria-label="plus">+</button>
        </div>
      </div>`;
  }

  /* ---------- View A: morning counter ---------- */
  function readParts(k){
    const n=needed(k);
    if(n>1e-9)  return ["build", "Build "+fmtHalf(n)];
    if(n<-1e-9) return ["over",  "Over "+fmtHalf(-n)];
    return ["set", "Set ✓"];
  }
  function refreshSummary(){
    const tot=document.getElementById("dbTotal"); if(tot) tot.textContent=fmtHalf(totalToBuild());
    const sub=document.getElementById("dbSub");
    if(sub){ const c=overCount(); sub.textContent = c>0 ? `${c} size${c>1?"s":""} overstocked` : ""; }
  }
  function paintRead(el,k){ const [cls,txt]=readParts(k); el.className="db-read "+cls; el.textContent=txt; }

  function renderCounter(){
    elBar.innerHTML=`
      ${homeBtnHTML("dbHome")}
      <h1>Dough Build <span class="sub">Morning build</span></h1>
      <button class="iconbtn" id="dbGear" aria-label="Build-to targets">⚙︎</button>`;
    elView.className="";

    if(!hasAnyBuildTo()){
      elView.innerHTML=`
        <div class="db-empty">
          <p>No build-to targets set yet.</p>
          <button class="btn primary" id="dbSetup">Set your build-to targets</button>
        </div>`;
      elFooter.innerHTML="";
      document.getElementById("dbHome").onclick=openHome;
      document.getElementById("dbGear").onclick=()=>go("editor");
      document.getElementById("dbSetup").onclick=()=>go("editor");
      return;
    }

    const cards = SIZES.map(([k,chip,name])=>{
      const [cls,txt]=readParts(k);
      return `
      <div class="db-card" data-k="${k}">
        <div class="db-head">
          <div class="db-name"><b>${esc(name)}</b><span class="db-chip">${esc(chip)}</span></div>
          <div class="db-read ${cls}">${esc(txt)}</div>
        </div>
        ${stepperHTML(onHand[k], "trays on hand")}
        <div class="db-hint">to ${esc(fmtHalf(state.buildTo[k]))} · have ${esc(fmtHalf(onHand[k]))}</div>
      </div>`;
    }).join("");

    elView.innerHTML=`
      <div class="bigtot">
        <div class="lbl">Total to build</div>
        <div class="v"><span id="dbTotal">${esc(fmtHalf(totalToBuild()))}</span></div>
        <div class="u">trays</div>
        <div class="u" id="dbSub"></div>
      </div>
      ${cards}`;
    refreshSummary();

    SIZES.forEach(([k])=>{
      const card=elView.querySelector(`.db-card[data-k="${k}"]`);
      const numEl=card.querySelector(".num");
      const readEl=card.querySelector(".db-read");
      const hintEl=card.querySelector(".db-hint");
      function cur(){ return Number(onHand[k])||0; }
      function set(v){
        onHand[k]=clampHalf(v);
        numEl.textContent=fmtHalf(onHand[k]);
        paintRead(readEl,k);
        hintEl.textContent=`to ${fmtHalf(state.buildTo[k])} · have ${fmtHalf(onHand[k])}`;
        refreshSummary();
      }
      const minus=card.querySelector(".minus"), plus=card.querySelector(".plus");
      minus.onclick=()=>set(cur()-0.5);
      plus.onclick=()=>set(cur()+0.5);
      attachRepeat(minus,()=>set(cur()-0.5));
      attachRepeat(plus,()=>set(cur()+0.5));
    });

    elFooter.innerHTML=`<div class="btn-row"><button class="btn ghost" id="dbClear">Clear counts</button></div>`;
    document.getElementById("dbClear").onclick=()=>{ onHand=blank(); render(); toast("Counts cleared"); };
    document.getElementById("dbHome").onclick=openHome;
    document.getElementById("dbGear").onclick=()=>go("editor");
  }

  /* ---------- View B: build-to editor ---------- */
  function renderEditor(){
    elBar.innerHTML=`
      ${homeBtnHTML("dbHome")}
      <h1>Dough Build <span class="sub">Build-to targets</span></h1>`;
    elView.className="";

    const rows = SIZES.map(([k,chip,name])=>`
      <div class="db-card" data-k="${k}">
        <div class="db-head"><div class="db-name"><b>${esc(name)}</b><span class="db-chip">${esc(chip)}</span></div></div>
        ${stepperHTML(state.buildTo[k], "trays to build to")}
      </div>`).join("");
    elView.innerHTML = rows;

    SIZES.forEach(([k])=>{
      const card=elView.querySelector(`.db-card[data-k="${k}"]`);
      const numEl=card.querySelector(".num");
      function cur(){ return Number(state.buildTo[k])||0; }
      function set(v){ state.buildTo[k]=clampHalf(v); save(); numEl.textContent=fmtHalf(state.buildTo[k]); }
      const minus=card.querySelector(".minus"), plus=card.querySelector(".plus");
      minus.onclick=()=>set(cur()-0.5);
      plus.onclick=()=>set(cur()+0.5);
      attachRepeat(minus,()=>set(cur()-0.5));
      attachRepeat(plus,()=>set(cur()+0.5));
    });

    elFooter.innerHTML=`<div class="btn-row"><button class="btn primary" id="dbSave">Save</button></div>`;
    document.getElementById("dbSave").onclick=()=>{ save(); go("counter"); toast("Saved"); };
    document.getElementById("dbHome").onclick=openHome;
  }

  /* ---------- Self-test (core math + half formatting) ---------- */
  function _selftest(){
    const savedBT=state.buildTo, savedOH=onHand;
    try{
      state.buildTo={jr:0,sm:0,md:3,lg:4,xl:2};
      onHand       ={jr:0,sm:0,md:3,lg:1.5,xl:3.5};
      const approx=(a,b)=>Math.abs(a-b)<1e-9;
      const checks=[
        ["needed Build (lg)",  needed("lg"),  2.5],
        ["needed Set (md)",    needed("md"),  0],
        ["needed Over (xl)",   needed("xl"), -1.5],
        ["total positive-only",totalToBuild(),2.5],
        ["fmtHalf 2.5", fmtHalf(2.5)==="2½"?1:0, 1],
        ["fmtHalf 3",   fmtHalf(3)==="3"?1:0,   1],
        ["fmtHalf 0.5", fmtHalf(0.5)==="½"?1:0, 1],
      ];
      let ok=true;
      for(const [name,got,exp] of checks){
        if(!approx(got,exp)){ ok=false; console.error(`DoughBuild calc FAIL: ${name} -> ${got}, expected ${exp}`); }
      }
      if(ok) console.log("DoughBuild calc self-test: "+checks.length+"/"+checks.length+" OK");
      return ok;
    } finally { state.buildTo=savedBT; onHand=savedOH; }
  }
  try{ _selftest(); }catch(e){}

  return { STORE, render, reset, reload, _selftest };
})();

/* ====================================================================
   PWA install (manifest via blob) + boot
   ==================================================================== */
(function injectManifest(){
  try{
    const icon="data:image/svg+xml,"+encodeURIComponent(
      `<svg xmlns='http://www.w3.org/2000/svg' width='512' height='512'><rect width='512' height='512' rx='96' fill='#e8491d'/><text x='50%' y='58%' font-size='300' text-anchor='middle' fill='#fff' font-family='Arial' font-weight='bold'>H</text></svg>`);
    const manifest={ name:"Howie Helper", short_name:"Howie Helper", display:"standalone",
      background_color:"#14110f", theme_color:"#e8491d", start_url:".",
      icons:[{src:icon,sizes:"512x512",type:"image/svg+xml"}] };
    const blob=new Blob([JSON.stringify(manifest)],{type:"application/json"});
    const link=document.createElement("link"); link.rel="manifest"; link.href=URL.createObjectURL(blob);
    document.head.appendChild(link);
    const al=document.createElement("link"); al.rel="apple-touch-icon"; al.href=icon; document.head.appendChild(al);
  }catch(e){}
})();

document.addEventListener("dblclick",e=>{ e.preventDefault(); },{passive:false});

/* Boot: jump to last-used tool, else home. */
(function boot(){
  const last = shell.landing==="last" ? toolById(shell.lastTool) : null;
  if(last && last.status==="active"){
    activeTool=last.id; appView="tool";
    if(last.id==="nightlyInventory") Inv.reset();
  } else {
    appView="home";
  }
  renderApp();
})();

})();

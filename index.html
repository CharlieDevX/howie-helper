  }
  function exportText(when){
    const r=resultInfo();
    const L=[];
    L.push("Howie Helper — Drawer Cash");
    if(shell.storeName) L.push(shell.storeName);
    L.push(when);
    L.push(state.mode==="open" ? "Start Drawer (Open)" : "Balance / Close");
    L.push("");
    summaryRows().forEach(([k,v])=>L.push(k.padEnd(15," ") + v));
    L.push("");
    L.push(r.label);
    return L.join("\n");
  }
  function roundRect(x,rx,ry,w,h,rad){
    x.beginPath();
    x.moveTo(rx+rad,ry);
    x.arcTo(rx+w,ry,   rx+w,ry+h, rad);
    x.arcTo(rx+w,ry+h, rx,  ry+h, rad);
    x.arcTo(rx,  ry+h, rx,  ry,   rad);
    x.arcTo(rx,  ry,   rx+w,ry,   rad);
    x.closePath();
  }
  function drawReceipt(when){
    const W=720, pad=56, rows=summaryRows(), r=resultInfo();
    const headH=210, rowH=66, resH=150, botPad=44;
    const H=headH + rows.length*rowH + resH + botPad;
    const c=document.createElement("canvas"); c.width=W; c.height=H;
    const x=c.getContext("2d");
    x.fillStyle="#14110f"; x.fillRect(0,0,W,H);
    roundRect(x,20,20,W-40,H-40,28); x.fillStyle="#211c19"; x.fill();
    x.lineWidth=2; x.strokeStyle="#3a322c"; x.stroke();
    // accent top strip
    x.save(); roundRect(x,20,20,W-40,H-40,28); x.clip();
    x.fillStyle="#e8491d"; x.fillRect(20,20,W-40,8); x.restore();
    // title
    x.textAlign="left"; x.fillStyle="#f4efe9"; x.font="700 42px -apple-system,Segoe UI,Arial";
    x.fillText("Drawer Cash", pad, 96);
    x.fillStyle="#a8998c"; x.font="500 24px -apple-system,Segoe UI,Arial";
    x.fillText((shell.storeName?shell.storeName+"   ·   ":"")+when, pad, 132);
    // mode pill
    const modeTxt=state.mode==="open" ? "START DRAWER" : "BALANCE / CLOSE";
    x.font="700 22px -apple-system,Segoe UI,Arial";
    const pw=x.measureText(modeTxt).width+34;
    roundRect(x,pad,154,pw,38,19); x.fillStyle="#2c2521"; x.fill(); x.strokeStyle="#3a322c"; x.lineWidth=1.5; x.stroke();
    x.fillStyle=state.mode==="open"?"#3fb56b":"#f3a712"; x.textAlign="left";
    x.fillText(modeTxt, pad+17, 180);
    // rows
    let y=headH+30;
    rows.forEach(([k,v])=>{
      const isTotal = k==="Counted total";
      x.strokeStyle="#322b26"; x.lineWidth=1; x.beginPath(); x.moveTo(pad,y-rowH+18); x.lineTo(W-pad,y-rowH+18); x.stroke();
      x.textAlign="left"; x.fillStyle=isTotal?"#f4efe9":"#a8998c";
      x.font=(isTotal?"700 30px":"500 27px")+" -apple-system,Segoe UI,Arial";
      x.fillText(k, pad, y);
      x.textAlign="right"; x.fillStyle="#f4efe9"; x.font="700 30px -apple-system,Segoe UI,Arial";
      x.fillText(v, W-pad, y);
      y+=rowH;
    });
    // result block
    const by=y-10;
    roundRect(x,pad,by,W-pad*2,resH-30,20); x.fillStyle="#1b1613"; x.fill();
    x.strokeStyle=r.rgb; x.lineWidth=3; x.stroke();
    x.textAlign="center"; x.fillStyle=r.rgb; x.font="800 56px -apple-system,Segoe UI,Arial";
    x.fillText(r.label, W/2, by+(resH-30)/2+20);
    return c;
  }
  function nowStamp(){
    const d=new Date();
    const date=d.toLocaleDateString(undefined,{month:"short",day:"numeric",year:"numeric"});
    const time=d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
    return date+" · "+time;
  }
  function renderResult(){
    const when=nowStamp();
    const r=resultInfo();
    elBar.innerHTML=`
      <button class="iconbtn" id="dcBack" aria-label="Back">←</button>
      <h1>Drawer Cash <span class="sub">summary</span></h1>`;
    document.getElementById("dcBack").onclick=()=>go("count");

    const rowsHtml=summaryRows().map(([k,v])=>
      `<div class="dc-rrow ${k==='Counted total'?'total':''}"><span>${esc(k)}</span><b>${esc(v)}</b></div>`).join("");

    elView.className="";
    elView.innerHTML=`
      <div class="dc-receipt">
        <div class="dc-rtitle">Drawer Cash</div>
        <div class="dc-rsub">${shell.storeName?esc(shell.storeName)+" · ":""}${esc(when)}</div>
        <div class="dc-rmode ${state.mode}">${state.mode==="open"?"START DRAWER":"BALANCE / CLOSE"}</div>
        ${rowsHtml}
        <div class="dc-rresult" style="color:${r.color};border-color:${r.color}">${r.label}</div>
      </div>
      <textarea class="exp" id="dcExp" readonly>${esc(exportText(when))}</textarea>`;

    elFooter.innerHTML=`
      <div class="btn-row" style="margin-bottom:10px;">
        <button class="btn primary" id="dcImg">📷 Save image</button>
      </div>
      <div class="btn-row">
        <button class="btn ghost" id="dcShare">Share</button>
        <button class="btn good" id="dcCopy">Copy</button>
      </div>`;

    document.getElementById("dcImg").onclick=()=>saveImage(when);
    document.getElementById("dcCopy").onclick=async()=>{
      const txt=document.getElementById("dcExp").value;
      try{ await navigator.clipboard.writeText(txt); toast("Copied"); }
      catch(e){ const ta=document.getElementById("dcExp"); ta.focus(); ta.select(); document.execCommand&&document.execCommand("copy"); toast("Copied"); }
    };
    document.getElementById("dcShare").onclick=async()=>{
      const txt=document.getElementById("dcExp").value;
      if(navigator.share){ try{ await navigator.share({title:"Howie Helper — Drawer Cash",text:txt}); }catch(e){} }
      else { try{ await navigator.clipboard.writeText(txt); toast("Copied (share n/a)"); }catch(e){ toast("Share not supported"); } }
    };
  }
  function saveImage(when){
    const c=drawReceipt(when);
    c.toBlob(async(blob)=>{
      if(!blob){ toast("Could not create image"); return; }
      const fname="drawer-cash-"+state.mode+".png";
      try{
        const file=new File([blob],fname,{type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Drawer Cash"}); return;
        }
      }catch(e){ /* fall through to download */ }
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a"); a.href=url; a.download=fname;
      document.body.appendChild(a); a.click(); a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      toast("Image saved");
    },"image/png");
  }

  return { STORE, render, reset, reload };
})();

/* ====================================================================
   SCHEDULE MAKER — manual weekly schedule creator/editor
   ==================================================================== */
const Sched = (function(){
  const STORE = "howiehelper.scheduleMaker.v1";
  const overlayRoot = document.getElementById("overlayRoot");
  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];   // index 0..6
  const SECTIONS = [
    {key:"manager", label:"Managers"},
    {key:"insider", label:"Insiders"},
    {key:"driver",  label:"Drivers"},
  ];
  const IMPORTANT_ROWS = [
    {key:"truck",         label:"Truck"},
    {key:"specialEvents", label:"Special Events"},
    {key:"weather",       label:"Weather"},
    {key:"training",      label:"Training"},
  ];
  const COLSPAN = 16;   // name + 7*(shift+hrs) + total

  /* ---------------- date helpers (local TZ) ---------------- */
  function isoOf(dt){
    const y=dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,"0"), d=String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  function parseISO(s){ return new Date(String(s)+"T00:00"); }
  function mondayISO(dt){
    const d=new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
    const wd=d.getDay();                       // 0=Sun..6=Sat
    d.setDate(d.getDate() + (wd===0 ? -6 : 1-wd));
    return isoOf(d);
  }
  function mondayOfToday(){ return mondayISO(new Date()); }
  function dayDate(startISO, i){ const d=parseISO(startISO); d.setDate(d.getDate()+i); return d; }
  const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function weekLabel(startISO){ const d=parseISO(startISO); return `Week of ${MONTHS[d.getMonth()]} ${d.getDate()}`; }

  /* ---------------- calc engine: shift text -> hours ---------------- */
  function hm(s){ const p=String(s).split(":"); return (Number(p[0])||0)+(Number(p[1])||0)/60; }
  function clOf(weekday, ct){                  // close time as continuous-timeline decimal
    const friSat = (weekday===4 || weekday===5);   // Fri=4, Sat=5
    let h = hm(friSat ? (ct.friSat||"00:30") : (ct.sunThu||"22:30"));
    if(h < 9) h += 24;                          // 00:30 -> 24.5
    return h;                                   // Sun-Thu 22.5, Fri-Sat 24.5
  }
  function parseTime(t){                        // "10"->10, "10:30"->10.5, "10:00 AM"->null
    const m=String(t).trim().match(/^(\d{1,2})(?::(\d{2}))?$/);
    return m ? Number(m[1]) + (m[2]?Number(m[2])/60:0) : null;
  }
  function stripTags(raw){
    let s=String(raw);
    const tags={delivery:false,insider:false,training:false,break30:false,town:false};
    if(/town/i.test(s)){ tags.town=true; s=s.replace(/town/ig,""); }
    if(/\(8\)/.test(s)){ tags.break30=true; s=s.replace(/\(8\)/g,""); }
    if(/\(D\)/i.test(s)||/\/D/i.test(s)) tags.delivery=true; s=s.replace(/\(D\)/ig,"").replace(/\/D/ig,"");
    if(/\(I\)/i.test(s)||/\/I/i.test(s)) tags.insider=true;  s=s.replace(/\(I\)/ig,"").replace(/\/I/ig,"");
    if(/\/T/i.test(s)) tags.training=true;                   s=s.replace(/\/T/ig,"");
    if(/T\s*$/.test(s)){ tags.training=true; s=s.replace(/T\s*$/,""); }   // trailing bare T
    return { clean:s.trim(), tags };
  }
  function isOff(t){ t=t.trim(); return t==="" || /^(X|R|N\/A|FO|PO|PW|Assembly)$/i.test(t); }
  function resolveStart(v, CL){ for(const c of [v, v+12]) if(c>=9 && c<=CL) return c; return null; }
  function resolveEnd(tok, start, CL){
    if(/^cl$/i.test(tok.trim())) return CL;
    const v=parseTime(tok); if(v==null) return null;
    const cand=[v, v+12]; if(v===12) cand.push(24);   // ascending; first >start & <=CL wins.
    // (A hypothetical "10-11" on Fri resolves to 11:00, not 23:00 — real closing
    //  shifts start PM so the start filter pushes the end past noon.)
    for(const c of cand) if(c>start && c<=CL) return c;
    return null;
  }
  function parseShiftHours(raw, weekday, closeTimes){
    if(raw==null) return 0;
    const {clean}=stripTags(String(raw));
    if(isOff(clean)) return 0;                  // X/R/N-A/FO/PO/PW/Assembly/blank
    const CL=clOf(weekday, closeTimes);
    let sum=0;
    for(let seg of clean.split(",")){           // split shifts sum
      seg=seg.trim(); const dash=seg.indexOf("-");
      if(dash<0) continue;                       // bare single time -> 0 (no end)
      const a=parseTime(seg.slice(0,dash)); if(a==null) continue;
      const st=resolveStart(a, CL); if(st==null) continue;
      const en=resolveEnd(seg.slice(dash+1), st, CL); if(en==null) continue;
      sum += en - st;
    }
    return Math.round(sum*4)/4;                  // quarter-hour rounding
  }
  function _selftest(){
    const ct={sunThu:"22:30",friSat:"00:30"};
    const cases=[
      ["5-CL",3,5.5],["5-CL",4,7.5],["4-CL",4,8.5],["10:30-7",0,8.5],["10-8",0,10],
      ["4-CL",1,6.5],["5-10",2,5],["6-11",5,5],["9:30-11:30",6,2],["5-12",4,7],
      ["10:30-4:30, 7-CL",0,9.5],["4-cl(D)",3,6.5],["6-9/T",1,3],
      ["X",0,0],["R",0,0],["",0,0],["N/A",0,0],["10:00 AM",0,0],
    ];
    let ok=true;
    for(const [raw,wd,exp] of cases){
      const got=parseShiftHours(raw,wd,ct);
      if(got!==exp){ ok=false; console.error(`Sched parser FAIL: "${raw}" wd=${wd} -> ${got}, expected ${exp}`); }
    }
    if(ok) console.log("Sched parser self-test: 18/18 OK");
    return ok;
  }

  /* ---------------- state / persistence ---------------- */
  function emptyTags(){ return {delivery:false,insider:false,training:false,break30:false,town:false}; }
  function blankWeek(startDate){
    return { startDate,
      people:[],
      important:{ truck:Array(7).fill(""), specialEvents:Array(7).fill(""),
                  weather:Array(7).fill(""), training:Array(7).fill("") },
      projections:{ lastYearSales:Array(7).fill(null), projSales:Array(7).fill(null) } };
  }
  function normalizeWeek(w){
    if(!w.important) w.important={};
    IMPORTANT_ROWS.forEach(r=>{ if(!Array.isArray(w.important[r.key])) w.important[r.key]=Array(7).fill(""); });
    if(!w.projections) w.projections={};
    if(!Array.isArray(w.projections.lastYearSales)) w.projections.lastYearSales=Array(7).fill(null);
    if(!Array.isArray(w.projections.projSales))     w.projections.projSales=Array(7).fill(null);
    if(!Array.isArray(w.people)) w.people=[];
    w.people.forEach(p=>{
      if(!p.id) p.id=uid();
      if(!p.section) p.section="insider";
      if(typeof p.minor!=="boolean") p.minor=false;
      if(!p.shifts||typeof p.shifts!=="object") p.shifts={};
      for(const d in p.shifts){ const sh=p.shifts[d]; if(sh && !sh.tags) sh.tags=emptyTags(); }
    });
  }
  function blank(){
    const m=mondayOfToday();
    const s={ weeks:{}, currentWeek:m, closeTimes:{ sunThu:"22:30", friSat:"00:30" },
              storeNumber:"84", builtBy:"" };
    s.weeks[m]=blankWeek(m);
    return s;
  }
  function load(){
    let s=null; try{ s=JSON.parse(localStorage.getItem(STORE)||"null"); }catch(e){ s=null; }
    if(!s || typeof s!=="object" || !s.weeks || typeof s.weeks!=="object") return blank();
    if(!s.closeTimes) s.closeTimes={ sunThu:"22:30", friSat:"00:30" };
    if(typeof s.storeNumber!=="string") s.storeNumber="84";
    if(typeof s.builtBy!=="string") s.builtBy="";
    for(const k in s.weeks){ s.weeks[k].startDate=k; normalizeWeek(s.weeks[k]); }
    if(!s.currentWeek || !s.weeks[s.currentWeek]){
      const keys=Object.keys(s.weeks).sort();
      s.currentWeek = keys[0] || mondayOfToday();
      if(!s.weeks[s.currentWeek]) s.weeks[s.currentWeek]=blankWeek(s.currentWeek);
    }
    return s;
  }
  let state=load();
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }
  function week(){ return state.weeks[state.currentWeek]; }

  /* ---------------- derived totals ---------------- */
  function cellHours(p, d){
    const sh=p.shifts[d]; if(!sh) return 0;
    return sh.hoursOverridden ? (Number(sh.hours)||0) : parseShiftHours(sh.raw, d, state.closeTimes);
  }
  function personTotal(p){ let t=0; for(let d=0;d<7;d++) t+=cellHours(p,d); return t; }
  function dayScheduledHours(d){ let t=0; for(const p of week().people) t+=cellHours(p,d); return t; }

  /* ---------------- router ---------------- */
  let route={ name:"grid" };
  function go(name, arg){ route={name, arg}; render(); window.scrollTo(0,0); }
  function reset(){ route={name:"grid"}; }
  function reload(){ state=load(); route={name:"grid"}; }
  function render(){
    // Only the full-week grid lifts the phone-width cap on desktop (see body.sched-grid CSS).
    document.body.classList.toggle("sched-grid", route.name==="grid" || !route.name);
    if(route.name==="people") renderPeople();
    else if(route.name==="weeks") renderWeeks();
    else if(route.name==="settings") renderSettings();
    else renderGrid();
  }

  /* ---------------- GRID ---------------- */
  function renderGrid(){
    elBar.innerHTML=`
      ${homeBtnHTML("schHome")}
      <h1>Schedule <span class="sub">${esc(weekLabel(state.currentWeek))}</span></h1>
      <button class="iconbtn" id="schWeeks" aria-label="Weeks">📅</button>
      <button class="iconbtn" id="schPeople" aria-label="People">👤</button>
      <button class="iconbtn" id="schExport" aria-label="Export">📤</button>
      <button class="iconbtn" id="schSettings" aria-label="Close times">⚙︎</button>`;
    elView.className="nofooter";

    const w=week();
    // header
    let head=`<th class="nmcol">Name</th>`;
    for(let d=0; d<7; d++){
      const dn=dayDate(state.currentWeek, d).getDate();
      head+=`<th class="day">${DAYS[d]}<span class="dn">${dn}</span></th><th class="hr">h</th>`;
    }
    head+=`<th class="totcol">Total</th>`;

    // body
    let body="";
    for(const sec of SECTIONS){
      body+=`<tr class="band"><td class="nmcol">${esc(sec.label)}</td><td colspan="${COLSPAN-1}"></td></tr>`;
      const ppl=w.people.filter(p=>p.section===sec.key);
      for(const p of ppl){
        let row=`<td class="nmcol"><span class="pname">${esc(p.name||"—")}${p.minor?' <span class="mtag">(M)</span>':''}</span></td>`;
        for(let d=0; d<7; d++){
          const sh=p.shifts[d];
          const raw=sh? (sh.raw||"") : "";
          const ov=sh && sh.hoursOverridden;
          const hrs=cellHours(p,d);
          const cls="cell"+(raw.trim()===""?" empty":"")+(ov?" ov":"");
          row+=`<td class="${cls}" data-pid="${esc(p.id)}" data-d="${d}">${esc(raw)||"·"}</td>`
             + `<td class="hr">${hrs>0?fmt(hrs):""}</td>`;
        }
        row+=`<td class="ptot">${fmt(personTotal(p))}</td>`;
        body+=`<tr>${row}</tr>`;
      }
    }

    // important
    body+=`<tr class="band"><td class="nmcol">Important</td><td colspan="${COLSPAN-1}"></td></tr>`;
    for(const r of IMPORTANT_ROWS){
      let row=`<td class="rowlbl">${esc(r.label)}</td>`;
      for(let d=0; d<7; d++){
        const v=(w.important[r.key]||[])[d]||"";
        row+=`<td class="note${v.trim()===""?" empty":""}" data-note="${esc(r.key)}" data-d="${d}" colspan="2">${esc(v)||"·"}</td>`;
      }
      row+=`<td></td>`;
      body+=`<tr>${row}</tr>`;
    }

    // projections
    body+=`<tr class="band"><td class="nmcol">Projections</td><td colspan="${COLSPAN-1}"></td></tr>`;
    const pj=w.projections;
    // Last Year $ (manual)
    body+=projInputRow("Last Yr $", "lastYearSales", pj.lastYearSales, "ly");
    // Proj $ (manual)
    body+=projInputRow("Proj $", "projSales", pj.projSales, "ps");
    // Proj Hrs (computed)
    let phRow=`<td class="rowlbl">Proj Hrs</td>`; let phTot=0;
    for(let d=0; d<7; d++){ const h=dayScheduledHours(d); phTot+=h; phRow+=`<td class="calc" colspan="2" id="ph-d${d}">${h>0?fmt(h):""}</td>`; }
    phRow+=`<td class="calc" id="ph-tot">${fmt(phTot)}</td>`;
    body+=`<tr>${phRow}</tr>`;
    // Hrs (-train) -> literal --
    body+=dashRow("Hrs (-trn)");
    // $PMH (computed)
    let pmhRow=`<td class="rowlbl">$PMH</td>`;
    for(let d=0; d<7; d++){ pmhRow+=`<td class="calc" colspan="2" id="pmh-d${d}">${pmhCell(d)}</td>`; }
    pmhRow+=`<td class="calc" id="pmh-tot">${pmhTotalCell()}</td>`;
    body+=`<tr>${pmhRow}</tr>`;
    // $PMH (-train) -> literal --
    body+=dashRow("$PMH (-trn)");

    const legend=`
      <details class="sched-legend">
        <summary>Notation legend</summary>
        <table>
          <tr><td><b>X</b> Day Off</td><td><b>R</b> Request Off</td><td><b>N/A</b> Not Avail</td></tr>
          <tr><td><b>(M)</b> Minor</td><td><b>(8)</b> 30-min Break</td><td><b>T</b> Training</td></tr>
          <tr><td><b>FO/PO</b> Food/Pop Order</td><td><b>PW</b> Paperwork</td><td><b>CL</b> Close</td></tr>
          <tr><td><b>(D)</b> Delivery shift</td><td><b>(I)</b> Insider shift</td><td></td></tr>
        </table>
      </details>`;

    elView.innerHTML=`
      <div class="sched-scroll">
        <table class="sched">
          <thead><tr>${head}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      ${legend}`;
    elFooter.innerHTML="";

    // wiring
    document.getElementById("schHome").onclick=openHome;
    document.getElementById("schWeeks").onclick=()=>go("weeks");
    document.getElementById("schPeople").onclick=()=>go("people");
    document.getElementById("schExport").onclick=()=>openExportChooser();
    document.getElementById("schSettings").onclick=()=>go("settings");
    elView.querySelectorAll("td.cell").forEach(td=>{
      td.onclick=()=>openCellEditor(td.getAttribute("data-pid"), Number(td.getAttribute("data-d")));
    });
    elView.querySelectorAll("td.note").forEach(td=>{
      td.onclick=()=>openNoteEditor(td.getAttribute("data-note"), Number(td.getAttribute("data-d")));
    });
    elView.querySelectorAll("input.proj-in").forEach(inp=>{
      inp.oninput=()=>{
        const arrKey=inp.getAttribute("data-arr"), d=Number(inp.getAttribute("data-d"));
        const raw=inp.value.trim();
        week().projections[arrKey][d] = raw===""? null : (isNaN(Number(raw))? null : Number(raw));
        save(); recomputeProjCells();
      };
    });
  }
  function projInputRow(label, arrKey, arr, idp){
    let row=`<td class="rowlbl">${esc(label)}</td>`;
    for(let d=0; d<7; d++){
      const v=(arr[d]==null?"":arr[d]);
      row+=`<td class="calc" colspan="2"><input class="proj-in" inputmode="numeric" data-arr="${arrKey}" data-d="${d}" value="${esc(String(v))}"></td>`;
    }
    row+=`<td class="calc" id="${idp}-tot">${money(sumArr(arr))}</td>`;
    return `<tr>${row}</tr>`;
  }
  function dashRow(label){
    let row=`<td class="rowlbl">${esc(label)}</td>`;
    for(let d=0; d<7; d++) row+=`<td class="calc" colspan="2">--</td>`;
    row+=`<td class="calc">--</td>`;
    return `<tr>${row}</tr>`;
  }
  function sumArr(arr){ let t=0,any=false; for(const v of arr){ if(v!=null){ t+=Number(v)||0; any=true; } } return any?t:null; }
  function money(n){ return n==null? "" : "$"+Math.round(n); }
  function pmhCell(d){
    const sales=week().projections.projSales[d], hrs=dayScheduledHours(d);
    return (hrs>0 && sales!=null) ? (sales/hrs).toFixed(2) : "";
  }
  function pmhTotalCell(){
    const sales=sumArr(week().projections.projSales);
    let hrs=0; for(let d=0; d<7; d++) hrs+=dayScheduledHours(d);
    return (hrs>0 && sales!=null) ? (sales/hrs).toFixed(2) : "";
  }
  function recomputeProjCells(){
    const lt=document.getElementById("ly-tot"); if(lt) lt.textContent=money(sumArr(week().projections.lastYearSales));
    const pt=document.getElementById("ps-tot"); if(pt) pt.textContent=money(sumArr(week().projections.projSales));
    for(let d=0; d<7; d++){ const c=document.getElementById("pmh-d"+d); if(c) c.textContent=pmhCell(d); }
    const tot=document.getElementById("pmh-tot"); if(tot) tot.textContent=pmhTotalCell();
  }

  /* ---------------- cell editor sheet ---------------- */
  function personById(id){ return week().people.find(p=>p.id===id)||null; }
  function openCellEditor(pid, d){
    const p=personById(pid); if(!p) return;
    const sh=p.shifts[d] || { raw:"", hours:0, hoursOverridden:false, tags:emptyTags() };
    let draftRaw = sh.raw||"";
    let tags = Object.assign(emptyTags(), sh.tags||{});
    let overridden = !!sh.hoursOverridden;
    let overVal = Number(sh.hours)||0;
    const dn=dayDate(state.currentWeek, d).getDate();

    function compute(){ return parseShiftHours(draftRaw, d, state.closeTimes); }
    const TAGDEFS=[["delivery","D"],["insider","I"],["training","T"],["break30","(8)"],["town","Town"]];

    function paint(){
      const auto=compute();
      const shown=overridden? overVal : auto;
      overlayRoot.innerHTML=`
        <div class="overlay" id="schOv">
          <div class="pad">
            <div class="padhead"><div class="l">${esc(p.name||"—")} · ${DAYS[d]} ${dn}</div></div>
            <input class="schfield" id="schRaw" inputmode="text" autocomplete="off" value="${esc(draftRaw)}" placeholder="e.g. 4-CL">
            <div class="schquick">
              <button data-q="X">X</button><button data-q="R">R</button>
              <button data-q="CL">CL</button><button data-q="">Clear</button>
            </div>
            <div class="schtags">
              ${TAGDEFS.map(([k,lbl])=>`<button data-tag="${k}" class="${tags[k]?'on':''}">${lbl}</button>`).join("")}
            </div>
            <div class="schhrs">
              <span class="lbl">Hours <span class="auto">(auto ${fmt(auto)})</span></span>
              <button class="ovbtn ${overridden?'on':''}" id="schOvBtn">${overridden?'Manual':'Auto'}</button>
              <input id="schHrs" inputmode="decimal" value="${fmt(shown)}" ${overridden?'':'disabled'}>
            </div>
            <button class="btn primary" id="schDone">Done</button>
          </div>
        </div>`;
      wire();
    }
    function wire(){
      const ovEl=document.getElementById("schOv");
      ovEl.onclick=e=>{ if(e.target===ovEl) saveAndClose(); };
      const rawEl=document.getElementById("schRaw");
      rawEl.oninput=()=>{ draftRaw=rawEl.value; if(!overridden){ const a=compute(); overVal=a; } refreshHrsLabel(); };
      overlayRoot.querySelectorAll(".schquick button").forEach(b=>{
        b.onclick=()=>{ draftRaw=b.getAttribute("data-q"); paint(); };
      });
      overlayRoot.querySelectorAll(".schtags button").forEach(b=>{
        b.onclick=()=>{ const k=b.getAttribute("data-tag"); tags[k]=!tags[k]; b.classList.toggle("on",tags[k]); };
      });
      document.getElementById("schOvBtn").onclick=()=>{ overridden=!overridden; if(overridden) overVal=compute(); paint(); };
      const hrsEl=document.getElementById("schHrs");
      if(hrsEl) hrsEl.oninput=()=>{ overVal=Number(hrsEl.value)||0; };
      document.getElementById("schDone").onclick=saveAndClose;
    }
    function refreshHrsLabel(){
      const auto=compute();
      const lbl=overlayRoot.querySelector(".schhrs .auto"); if(lbl) lbl.textContent=`(auto ${fmt(auto)})`;
      if(!overridden){ const hrsEl=document.getElementById("schHrs"); if(hrsEl) hrsEl.value=fmt(auto); }
    }
    function saveAndClose(){
      overlayRoot.innerHTML="";
      const rawTrim=(draftRaw||"").trim();
      // merge tags typed into raw with toggle states
      const parsed=stripTags(rawTrim);
      const merged=emptyTags(); for(const k in merged) merged[k]=tags[k]||parsed.tags[k];
      if(rawTrim==="" && !overridden){ delete p.shifts[d]; }
      else {
        p.shifts[d]={ raw:rawTrim, hours: overridden? overVal : compute(),
                      hoursOverridden: overridden, tags: merged };
      }
      save(); renderGrid();
    }
    paint();
  }

  function openNoteEditor(rowKey, d){
    const rowDef=IMPORTANT_ROWS.find(r=>r.key===rowKey);
    const dn=dayDate(state.currentWeek, d).getDate();
    const cur=(week().important[rowKey]||[])[d]||"";
    overlayRoot.innerHTML=`
      <div class="overlay" id="schNoteOv">
        <div class="pad">
          <div class="padhead"><div class="l">${esc(rowDef?rowDef.label:rowKey)} · ${DAYS[d]} ${dn}</div></div>
          <input class="schfield" id="schNote" inputmode="text" autocomplete="off" value="${esc(cur)}" placeholder="note">
          <button class="btn primary" id="schNoteDone">Done</button>
        </div>
      </div>`;
    const ovEl=document.getElementById("schNoteOv");
    function done(){ week().important[rowKey][d]=document.getElementById("schNote").value.trim(); overlayRoot.innerHTML=""; save(); renderGrid(); }
    ovEl.onclick=e=>{ if(e.target===ovEl) done(); };
    document.getElementById("schNoteDone").onclick=done;
  }

  /* ---------------- PEOPLE ---------------- */
  function renderPeople(){
    elBar.innerHTML=`
      <button class="iconbtn" id="schBack" aria-label="Back">←</button>
      <h1>People <span class="sub">${esc(weekLabel(state.currentWeek))}</span></h1>`;
    elView.className="";
    const w=week();
    let html="";
    for(const sec of SECTIONS){
      html+=`<div class="set-sec-h"><h2>${esc(sec.label)}</h2></div>`;
      const ppl=w.people.filter(p=>p.section===sec.key);
      for(const p of ppl){
        html+=`
          <div class="set-item" data-id="${esc(p.id)}">
            <div class="top">
              <input class="nameinp" value="${esc(p.name)}" placeholder="Name">
              <div class="order">
                <button class="miniicon mvup" aria-label="Up">↑</button>
                <button class="miniicon mvdn" aria-label="Down">↓</button>
                <button class="miniicon del" aria-label="Remove">🗑</button>
              </div>
            </div>
            <div class="top">
              <select class="secsel">${SECTIONS.map(s=>`<option value="${s.key}" ${s.key===p.section?'selected':''}>${esc(s.label)}</option>`).join("")}</select>
              <button class="miniicon mtog ${p.minor?'on':''}" aria-label="Minor toggle" style="${p.minor?'background:var(--accent2);color:#06210f;':''}">M</button>
            </div>
          </div>`;
      }
      html+=`<button class="addbtn" data-add="${sec.key}">+ Add ${esc(sec.label.replace(/s$/,""))}</button>`;
    }
    elView.innerHTML=html;
    elFooter.innerHTML="";

    document.getElementById("schBack").onclick=()=>go("grid");
    elView.querySelectorAll("button.addbtn").forEach(b=>{
      b.onclick=()=>{ w.people.push({ id:uid(), name:"", section:b.getAttribute("data-add"), minor:false, shifts:{} }); save(); renderPeople(); };
    });
    elView.querySelectorAll(".set-item").forEach(el=>{
      const id=el.getAttribute("data-id");
      const p=personById(id); if(!p) return;
      el.querySelector(".nameinp").oninput=e=>{ p.name=e.target.value; save(); };
      el.querySelector(".secsel").onchange=e=>{ p.section=e.target.value; save(); renderPeople(); };
      el.querySelector(".mtog").onclick=()=>{ p.minor=!p.minor; save(); renderPeople(); };
      el.querySelector(".mvup").onclick=()=>{ moveWithinSection(id,-1); };
      el.querySelector(".mvdn").onclick=()=>{ moveWithinSection(id,1); };
      el.querySelector(".del").onclick=()=>{
        if(confirm(`Remove ${p.name||"this person"}?`)){ w.people=w.people.filter(x=>x.id!==id); save(); renderPeople(); }
      };
    });
  }
  function moveWithinSection(id, dir){
    const ppl=week().people;
    const p=ppl.find(x=>x.id===id); if(!p) return;
    const idxs=ppl.map((x,i)=>x.section===p.section?i:-1).filter(i=>i>=0);
    const pos=idxs.indexOf(ppl.indexOf(p));
    const swap=pos+dir;
    if(swap<0||swap>=idxs.length) return;
    const a=idxs[pos], b=idxs[swap];
    [ppl[a], ppl[b]]=[ppl[b], ppl[a]];
    save(); renderPeople();
  }

  /* ---------------- WEEKS ---------------- */
  function renderWeeks(){
    elBar.innerHTML=`
      <button class="iconbtn" id="schBack" aria-label="Back">←</button>
      <h1>Weeks</h1>`;
    elView.className="";
    const keys=Object.keys(state.weeks).sort();
    let list="";
    for(const k of keys){
      const cur=k===state.currentWeek;
      const cnt=state.weeks[k].people.length;
      list+=`
        <div class="set-item" data-wk="${esc(k)}" style="${cur?'border-color:var(--accent2);':''}">
          <div class="top" style="margin:0;">
            <div style="flex:1;"><b style="font-size:15px;">${esc(weekLabel(k))}</b>
              <small style="color:var(--muted);display:block;">${esc(k)} · ${cnt} ${cnt===1?'person':'people'}${cur?' · current':''}</small></div>
            ${keys.length>1?`<button class="miniicon del wkdel" aria-label="Delete week">🗑</button>`:''}
          </div>
        </div>`;
    }
    elView.innerHTML=`
      ${list}
      <div class="setcard">
        <h3>New week</h3>
        <p>Pick any date — it snaps to that week's Monday.</p>
        <input class="txt" type="date" id="newWkDate" value="${esc(mondayOfToday())}">
        <div style="height:10px;"></div>
        <button class="btn primary" id="newWkBtn">Create week</button>
      </div>`;
    elFooter.innerHTML="";

    document.getElementById("schBack").onclick=()=>go("grid");
    elView.querySelectorAll(".set-item[data-wk]").forEach(el=>{
      const k=el.getAttribute("data-wk");
      el.onclick=e=>{ if(e.target.closest(".wkdel")) return; state.currentWeek=k; save(); go("grid"); };
      const del=el.querySelector(".wkdel");
      if(del) del.onclick=()=>{
        if(confirm(`Delete ${weekLabel(k)}? This erases that week's schedule.`)){
          delete state.weeks[k];
          if(state.currentWeek===k) state.currentWeek=Object.keys(state.weeks).sort()[0];
          save(); renderWeeks();
        }
      };
    });
    document.getElementById("newWkBtn").onclick=()=>{
      const raw=document.getElementById("newWkDate").value;
      if(!raw){ toast("Pick a date"); return; }
      const mon=mondayISO(parseISO(raw));
      if(state.weeks[mon]){ state.currentWeek=mon; save(); toast("Week already exists"); go("grid"); return; }
      const nw=blankWeek(mon);
      if(week().people.length && confirm("Copy people from the current week? OK = copy roster (blank shifts), Cancel = start empty.")){
        nw.people=week().people.map(p=>({ id:uid(), name:p.name, section:p.section, minor:p.minor, shifts:{} }));
      }
      state.weeks[mon]=nw; state.currentWeek=mon; save(); go("grid");
    };
  }

  /* ---------------- export (chooser → shareable image / printable, both orientations) ----------------
     Ported from the locked mockups (export-mockup-schedule-{shareable,printable}-{landscape,portrait}.html),
     bound to live week data. Shareable: html2canvas → navigator.share (preview fallback).
     Printable: window.print() via the shared #hhPrintHost; @page orientation injected per export. */
  function expName(ext){ return "schedule-"+state.currentWeek+"."+ext; }
  function weekRangeLabel(startISO){
    const a=dayDate(startISO,0), b=dayDate(startISO,6);
    return `${a.getMonth()+1}/${a.getDate()} – ${b.getMonth()+1}/${b.getDate()}`;
  }
  function hm12(t){                              // "22:30"→"10:30p", "00:30"→"12:30a", "9:00"→"9a"
    const m=String(t||"").match(/^(\d{1,2}):?(\d{2})?$/); if(!m) return esc(String(t||""));
    let h=Number(m[1]); const min=m[2]?Number(m[2]):0;
    const ap=h>=12?"p":"a"; let h12=h%12; if(h12===0) h12=12;
    return h12 + (min? ":"+String(min).padStart(2,"0") : "") + ap;
  }
  function closeLine(){
    const ct=state.closeTimes||{};
    return `Close · Sun–Thu ${hm12(ct.sunThu||"22:30")} · Fri–Sat ${hm12(ct.friSat||"00:30")}`;
  }
  function comma(n){ return (Math.round(Number(n)||0)).toLocaleString("en-US"); }
  function expStamp(){
    const d=new Date(); let h=d.getHours(); const ap=h>=12?"PM":"AM"; h=h%12; if(h===0) h=12;
    return `${MONTHS[d.getMonth()]} ${d.getDate()}, ${d.getFullYear()} · ${h}:${String(d.getMinutes()).padStart(2,"0")} ${ap}`;
  }
  function expHeadHTML(){
    let h=`<th class="nm">Name</th>`;
    for(let d=0; d<7; d++){ const dn=dayDate(state.currentWeek,d).getDate(); h+=`<th>${DAYS[d]}<span class="dn">${dn}</span></th>`; }
    return h+`<th>Total</th>`;
  }
  function expCellHTML(p, d){
    const sh=p.shifts[d]; const raw=sh?(sh.raw||""):"";
    if(isOff(raw)){ const tok=raw.trim()===""?"·":esc(raw.trim()); return `<td class="off">${tok}</td>`; }
    const hrs=cellHours(p,d);
    return `<td><span class="sh">${esc(raw)}</span><span class="hr">${hrs>0?fmt(hrs):""}</span></td>`;
  }
  function expProjRow(label, arr, share){
    let row=`<td class="nm">${esc(label)}</td>`;
    for(let d=0; d<7; d++){ const v=arr[d]; row+=`<td>${v==null?"":comma(v)}</td>`; }
    const tot=sumArr(arr);
    row+=`<td class="ptot">${tot==null?"":"$"+comma(tot)}</td>`;
    return `<tr${share?' class="rowlbl"':''}>${row}</tr>`;
  }
  function expBody(share){
    const w=week(); let body="";
    for(const sec of SECTIONS){
      body+=`<tr class="band"><td colspan="9">${esc(sec.label)}</td></tr>`;
      for(const p of w.people.filter(x=>x.section===sec.key)){
        let r=`<td class="nm">${esc(p.name||"—")}${p.minor?' <span class="mtag">(M)</span>':''}</td>`;
        for(let d=0; d<7; d++) r+=expCellHTML(p,d);
        r+=`<td class="ptot">${fmt(personTotal(p))}</td>`;
        body+=`<tr${share?' class="person"':''}>${r}</tr>`;
      }
    }
    // Important
    body+=`<tr class="band"><td colspan="9">Important</td></tr>`;
    for(const r of IMPORTANT_ROWS){
      let row=`<td class="nm">${esc(r.label)}</td>`;
      for(let d=0; d<7; d++){
        const v=((w.important[r.key]||[])[d]||"").trim();
        row+= v==="" ? `<td class="empty">·</td>` : `<td>${esc(v)}</td>`;
      }
      body+=`<tr class="note${share?' rowlbl':''}">${row}<td></td></tr>`;
    }
    // Projections (omit the on-screen "(-trn)" rows)
    const pj=w.projections;
    body+=`<tr class="band"><td colspan="9">Projections</td></tr>`;
    body+=expProjRow("Last Yr $", pj.lastYearSales, share);
    body+=expProjRow("Proj $",    pj.projSales,     share);
    let ph=`<td class="nm">Proj Hrs</td>`, phTot=0;
    for(let d=0; d<7; d++){ const h=dayScheduledHours(d); phTot+=h; ph+=`<td>${h>0?fmt(h):""}</td>`; }
    body+=`<tr class="calc">${ph}<td class="ptot">${fmt(phTot)}</td></tr>`;
    let pm=`<td class="nm">$PMH</td>`;

    body+=`<tr class="calc">${pm}<td class="ptot">${pmhTotalCell()}</td></tr>`;
    return body;
  }
  function totalSchedHours(){ let t=0; for(let d=0; d<7; d++) t+=dayScheduledHours(d); return t; }
  function shareableHTML(){
    const w=week(); const sn=esc(state.storeNumber||""); const by=(state.builtBy||"").trim();

    return `<div class="page">
      <div class="hd">
        <div class="t">WEEKLY SCHEDULE<small>HOWIE HELPER${sn?" · STORE "+sn:""}</small></div>
        <div class="m">${m}</div>
      </div>
      <table>
        <colgroup><col class="nm"><col><col><col><col><col><col><col><col class="tot"></colgroup>
        <thead><tr>${expHeadHTML()}</tr></thead>
        <tbody>${expBody(false)}</tbody>
      </table>
      <div class="ft">
        <span><b>X</b> Off</span><span><b>R</b> Request off</span><span><b>(M)</b> Minor</span>
        <span><b>(8)</b> 30-min break</span><span><b>(D)</b> Delivery</span><span><b>(I)</b> Insider</span>
        <span><b>/T</b> Training</span><span><b>CL</b> Close</span>
        <span><b>$PMH</b> = Proj $ ÷ Scheduled hours</span>
      </div>
    </div>`;

  function buildExportHTML(variant){ return variant==="share" ? shareableHTML() : printableHTML(); }

  async function downloadOrShare(blob, ext){
    if(!blob){ toast("Could not create file"); return; }
    const name=expName(ext), type=blob.type||(ext==="pdf"?"application/pdf":"image/png");
    try{
      const file=new File([blob],name,{type});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title:"Weekly Schedule"}); return;
      }
    }catch(e){ /* fall through to download */ }
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a"); a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast(ext.toUpperCase()+" saved");
  }
  function savePdf(canvas, orientation){
    try{
      const { jsPDF }=window.jspdf;
      const orient=orientation==="portrait"?"portrait":"landscape";
      const pdf=new jsPDF({unit:"pt",format:"letter",orientation:orient});
      const pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
      let iw=pw, ih=pw*canvas.height/canvas.width;
      if(ih>ph){ ih=ph; iw=ph*canvas.width/canvas.height; }
      pdf.addImage(canvas.toDataURL("image/png"),"PNG",(pw-iw)/2,(ph-ih)/2,iw,ih);
      downloadOrShare(pdf.output("blob"),"pdf");
    }catch(e){ toast("Could not create PDF"); }
  }
  function openExportPreview(canvas, orientation){

    const close=()=>{ overlayRoot.innerHTML=""; };
    document.getElementById("schxOv").onclick=e=>{ if(e.target.id==="schxOv") close(); };
    document.getElementById("schxClose").onclick=close;
    document.getElementById("schxPng").onclick=()=>canvas.toBlob(b=>downloadOrShare(b,"png"),"image/png");
    document.getElementById("schxPdf").onclick=()=>savePdf(canvas, orientation);
    document.getElementById("schxPrint").onclick=()=>{ close(); printSchedule(orientation); };

  async function shareSchedule(orientation){
    overlayRoot.innerHTML="";                    // close chooser
    const host=document.createElement("div");
    host.className="schx"+(orientation==="portrait"?" portrait":"");
    host.style.cssText="position:absolute;left:-10000px;top:0;";

    const blob=await new Promise(r=>canvas.toBlob(r,"image/png"));
    if(blob){
      try{

        if(navigator.canShare && navigator.canShare({files:[file]})){
          await navigator.share({files:[file], title:"Weekly Schedule"}); return;

  function printSchedule(orientation){
    overlayRoot.innerHTML="";                    // close chooser
    const orient=orientation==="portrait"?"portrait":"landscape";
    const host=document.createElement("div");
    host.id="hhPrintHost"; host.className="schp"+(orient==="portrait"?" portrait":"");
    host.innerHTML=buildExportHTML("print");
    document.body.appendChild(host);
    // The shared @media print block hard-codes @page; inject the chosen orientation.
    const pageStyle=document.createElement("style"); pageStyle.id="schPageStyle";
    pageStyle.textContent=`@media print{ @page{ size:letter ${orient}; margin:0.4in; } }`;
    document.head.appendChild(pageStyle);
    document.body.classList.add("hh-printing");
    let cleaned=false;
    const cleanup=()=>{ if(cleaned) return; cleaned=true;
      host.remove(); pageStyle.remove(); document.body.classList.remove("hh-printing");
      window.removeEventListener("afterprint",cleanup); };
    window.addEventListener("afterprint",cleanup);
    setTimeout(()=>{ try{ window.print(); }catch(e){} }, 60);
    setTimeout(cleanup, 60000);
  }
  function openExportChooser(){

/* ====================================================================
   NIGHTLY NUMBERS — weekly "Daily Numbers" sheet (Mon–Sun, Monday reset)
   Week overview grid → tap a day → single-day entry. Inputs only are
   stored; every "to-date" / labor row is derived on render. Exports a
   shareable image (group chat) and a printable/PDF, ported from the two
   locked mockups in the planning folder.
   ==================================================================== */
const Numbers = (function(){
  const STORE = "howiehelper.numbers.v1";
  const overlayRoot = document.getElementById("overlayRoot");
  const DAYS = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];           // index 0=Mon..6=Sun
  const DAYS_LONG = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
  const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const MONTHS_LONG = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  /* ---------------- date helpers (local TZ, same convention as Sched) ---------------- */
  function isoOf(dt){
    const y=dt.getFullYear(), m=String(dt.getMonth()+1).padStart(2,"0"), d=String(dt.getDate()).padStart(2,"0");
    return `${y}-${m}-${d}`;
  }
  function parseISO(s){ return new Date(String(s)+"T00:00"); }
  function mondayISO(dt){
    const d=new Date(dt.getFullYear(), dt.getMonth(), dt.getDate());
    const wd=d.getDay();                       // 0=Sun..6=Sat
    d.setDate(d.getDate() + (wd===0 ? -6 : 1-wd));
    return isoOf(d);
  }
  function mondayOfToday(){ return mondayISO(new Date()); }
  function dayDate(startISO, i){ const d=parseISO(startISO); d.setDate(d.getDate()+i); return d; }
  // "6/15 - 6/21" — Charlie's locked label format.
  function weekRangeLabel(startISO){
    const a=dayDate(startISO,0), b=dayDate(startISO,6);
    return `${a.getMonth()+1}/${a.getDate()} - ${b.getMonth()+1}/${b.getDate()}`;
  }

  /* ---------------- state / persistence (own key, dev-isolated via deploy sed) ---------------- */
  function blankDay(){
    return { netSales:null, manHours:null, laborDollars:null, driverComp:null,
             ddCount:null, otd:"", latePct:null, dailyCash:null, lunchSales:null };
  }
  function blankWeek(startISO){
    return { weekStart:startISO,
      projected:{ sales:Array(7).fill(null), manHours:Array(7).fill(null) },
      days:{} };
  }
  function defaults(){
    const m=mondayOfToday();
    const s={ storeNumber:"84", ddRate:5.50, goals:{ otd:"18:00", latePct:8 },
              weeks:{}, currentWeek:m };
    s.weeks[m]=blankWeek(m);
    return s;
  }
  function normalizeWeek(w, k){
    w.weekStart=k;
    if(!w.projected) w.projected={};
    if(!Array.isArray(w.projected.sales))    w.projected.sales=Array(7).fill(null);
    if(!Array.isArray(w.projected.manHours)) w.projected.manHours=Array(7).fill(null);
    if(!w.days || typeof w.days!=="object") w.days={};
  }
  function load(){
    let s=null; try{ s=JSON.parse(localStorage.getItem(STORE)||"null"); }catch(e){ s=null; }
    if(!s || typeof s!=="object" || !s.weeks || typeof s.weeks!=="object") return defaults();
    if(typeof s.storeNumber!=="string") s.storeNumber=(s.storeNumber!=null?String(s.storeNumber):"84");
    if(!(Number(s.ddRate)>0)) s.ddRate=5.50;
    if(!s.goals || typeof s.goals!=="object") s.goals={};
    if(typeof s.goals.otd!=="string") s.goals.otd="18:00";
    if(!(Number(s.goals.latePct)>=0)) s.goals.latePct=8;
    for(const k in s.weeks) normalizeWeek(s.weeks[k], k);
    if(!s.currentWeek || !s.weeks[s.currentWeek]){
      const keys=Object.keys(s.weeks).sort();
      s.currentWeek = keys[0] || mondayOfToday();
      if(!s.weeks[s.currentWeek]) s.weeks[s.currentWeek]=blankWeek(s.currentWeek);
    }
    return s;
  }
  let state=load();
  function save(){ try{ localStorage.setItem(STORE, JSON.stringify(state)); }catch(e){} }
  function week(){ return state.weeks[state.currentWeek]; }
  function getDay(d){ return week().days[d] || null; }
  function ensureDay(d){ if(!week().days[d]) week().days[d]=blankDay(); return week().days[d]; }
  function ddRate(){ return Number(state.ddRate)||5.50; }

  /* ---------------- calc engine (everything derived; nothing stored) ---------------- */
  // A day is "entered" once its Net Daily Sales is keyed — the figure all
  // to-date rows accumulate from (matches the mockups' demo data).
  function num(v){ return (v==null||v==="")?null:(Number(v)); }
  function netOf(d){ const dy=getDay(d); return dy? num(dy.netSales) : null; }
  function entered(d){ return netOf(d)!=null; }
  function dd$(dy){ return (Number(dy&&dy.ddCount)||0) * ddRate(); }
  function totalLabor(dy){ return (Number(dy&&dy.laborDollars)||0)+(Number(dy&&dy.driverComp)||0)+dd$(dy); }
  function salesToDate(d){ let t=0; for(let i=0;i<=d;i++){ const n=netOf(i); if(n!=null) t+=n; } return t; }
  function totalLaborToDate(d){ let t=0; for(let i=0;i<=d;i++){ if(entered(i)) t+=totalLabor(getDay(i)); } return t; }
  function laborPct(d){ const n=netOf(d); const dy=getDay(d); return (n>0&&dy)? totalLabor(dy)/n*100 : null; }
  function laborPctToDate(d){ const s=salesToDate(d); return s>0? totalLaborToDate(d)/s*100 : null; }
  function cashToDate(d){ let t=0; for(let i=0;i<=d;i++){ if(entered(i)) t+=(Number(getDay(i).dailyCash)||0); } return t; }
  function lastEnteredDay(){ let last=-1; for(let d=0;d<7;d++) if(entered(d)) last=d; return last; }
  function daysEnteredCount(){ let c=0; for(let d=0;d<7;d++) if(entered(d)) c++; return c; }
  function mmssToSec(s){ const m=String(s||"").match(/^(\d{1,2}):([0-5]\d)$/); return m? Number(m[1])*60+Number(m[2]) : null; }
  function otdMeets(s){ const a=mmssToSec(s), g=mmssToSec(state.goals.otd); return (a!=null&&g!=null)? a<=g : null; }
  function lateMeets(n){ return n==null? null : (Number(n) < (Number(state.goals.latePct)||8)); }

  /* ---------------- formatters ---------------- */
  function commaInt(s){ return String(s).replace(/\B(?=(\d{3})+(?!\d))/g,","); }
  function money2(n){ n=Number(n)||0; const neg=n<0; n=Math.abs(n); const f=n.toFixed(2).split(".");
    return (neg?"-":"")+commaInt(f[0])+"."+f[1]; }
  function numStr(n){ // trim trailing zeros, thousands separators (projected sales/hours)
    if(n==null||n==="") return "";
    let r=Math.round(Number(n)*100)/100; const neg=r<0; r=Math.abs(r);
    let s=(Math.abs(r-Math.round(r))<1e-9)? String(Math.round(r)) : String(r);
    const p=s.split("."); return (neg?"-":"")+commaInt(p[0])+(p[1]?("."+p[1]):"");
  }
  function pctStr(n){ return n==null? "" : (Math.round(Number(n)*100)/100).toFixed(2)+"%"; }
  function signed(n){ n=Math.round((Number(n)||0)*100)/100; if(n===0) return "0.00"; return (n>0?"+":"-")+Math.abs(n).toFixed(2); }
  function signedMoney(n){ n=Math.round((Number(n)||0)*100)/100; if(n===0) return "$0.00"; return (n>0?"+$":"-$")+money2(Math.abs(n)); }

  /* ---------------- row model: one source feeds the grid + both exports ----------------
     Each row produces a per-day cell { text, blank, calc, goal:'good'|'bad'|null,
     sign:'pos'|'neg'|null }. Renderers map those to their own classes
     (screen + shareable use good/bad colors; printable uses a grey "miss" shade). */
  const ROWS = [
    { key:"net",        label:"Net Daily Sales",        calc:false },
    { key:"projSales",  label:"Projected Sales",        calc:false },
    { key:"salesToDate",label:"Sales to Date",          calc:true  },
    { key:"manHours",   label:"Daily Man Hours",        calc:false },
    { key:"projHours",  label:"Projected Man Hours",    calc:false },
    { key:"labor",      label:"Labor $",                calc:false },
    { key:"driverComp", label:"Driver Comp $",          calc:false },
    { key:"dd",         label:"Door Dash $",            calc:false, ddhint:true },
    { key:"totalLabor", label:"Total Labor $",          calc:true  },
    { key:"tlToDate",   label:"Total Labor $ to Date",  calc:true  },
    { key:"laborPct",   label:"Labor %",                calc:true  },
    { key:"laborPctTD", label:"Labor % to Date",        calc:true  },
    { key:"otd",        label:"OTD",                    calc:false, goal:"otd"  },
    { key:"latePct",    label:"Late %",                 calc:false, goal:"late" },
    { key:"dailyCash",  label:"Daily Cash +/-",         calc:false },
    { key:"totalCash",  label:"Total Cash +/-",         calc:true  },
    { key:"lunch",      label:"Lunch Sales",            calc:false },
  ];
  function rowSub(r){
    if(r.goal==="otd")  return "goal ≤ "+(state.goals.otd||"18:00");
    if(r.goal==="late") return "goal < "+(Number(state.goals.latePct)||8)+"%";
    return "";
  }
  // Compute one cell for row.key on weekday d.
  function cellOf(key, d){
    const dy=getDay(d), w=week(), ent=entered(d);
    const blank=(text)=>({ text:"—", blank:true });
    const val =(text,extra)=>Object.assign({ text, blank:false }, extra||{});
    switch(key){
      case "net":        { const v=netOf(d); return v==null? blank() : val(money2(v)); }
      case "projSales":  { const v=w.projected.sales[d]; return v==null? blank() : val(numStr(v)); }
      case "salesToDate":return ent? val(money2(salesToDate(d)), {calc:true}) : Object.assign(blank(),{calc:true});
      case "manHours":   { const v=dy?num(dy.manHours):null; return v==null? blank() : val(numStr(v)); }
      case "projHours":  { const v=w.projected.manHours[d]; return v==null? blank() : val(numStr(v)); }
      case "labor":      { const v=dy?num(dy.laborDollars):null; return v==null? blank() : val(money2(v)); }
      case "driverComp": { const v=dy?num(dy.driverComp):null; return v==null? blank() : val(money2(v)); }
      case "dd":         { const c=dy?num(dy.ddCount):null; return c==null? blank() : val(money2(c*ddRate()), {dd:c}); }
      case "totalLabor": return ent? val(money2(totalLabor(dy)), {calc:true}) : Object.assign(blank(),{calc:true});
      case "tlToDate":   return ent? val(money2(totalLaborToDate(d)), {calc:true}) : Object.assign(blank(),{calc:true});
      case "laborPct":   { const v=laborPct(d); return (ent&&v!=null)? val(pctStr(v),{calc:true}) : Object.assign(blank(),{calc:true}); }
      case "laborPctTD": { const v=laborPctToDate(d); return (ent&&v!=null)? val(pctStr(v),{calc:true}) : Object.assign(blank(),{calc:true}); }
      case "otd":        { const v=dy&&dy.otd? dy.otd : null; if(!v) return blank();
                           const m=otdMeets(v); return val(v, {goal: m===null?null:(m?"good":"bad")}); }
      case "latePct":    { const v=dy?num(dy.latePct):null; if(v==null) return blank();
                           const m=lateMeets(v); return val(numStr(v)+"%", {goal: m===null?null:(m?"good":"bad")}); }
      case "dailyCash":  { if(!ent && !(dy&&dy.dailyCash!=null)) return blank();
                           const v=Number(dy&&dy.dailyCash)||0; return val(signed(v), {sign: v>0?"pos":(v<0?"neg":null)}); }
      case "totalCash":  { if(!ent) return Object.assign(blank(),{calc:true});
                           const v=cashToDate(d); return val(signed(v), {calc:true, sign: v>0?"pos":(v<0?"neg":null)}); }
      case "lunch":      { const v=dy?num(dy.lunchSales):null; return v==null? blank() : val(money2(v)); }
    }
    return blank();
  }

  /* ---------------- shared export data model ---------------- */
  function fmtStamp(){
    const d=new Date();
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})
      + " · " + d.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"});
  }
  function exportData(){
    const start=state.currentWeek;
    const dates=[]; for(let d=0;d<7;d++) dates.push(dayDate(start,d).getDate());
    const last=lastEnteredDay();
    const rows=ROWS.map(r=>({
      key:r.key, label:r.label, sub:rowSub(r), calc:!!r.calc,
      cells:[0,1,2,3,4,5,6].map(d=>cellOf(r.key,d))
    }));
    return {
      storeNumber: state.storeNumber||"84",
      weekRange: weekRangeLabel(start),
      throughLabel: last>=0 ? DAYS_LONG[last] : null,
      daysEntered: daysEnteredCount(),
      dates, rows,
      kpis: last>=0 ? {
        salesToDate: money2(salesToDate(last)),
        laborPctTD:  laborPctToDate(last)!=null? pctStr(laborPctToDate(last)) : "—",
        cashToDate:  signedMoney(cashToDate(last)),
        cashSign:    cashToDate(last)>0?"pos":(cashToDate(last)<0?"neg":"")
      } : null,
      stamp: fmtStamp()
    };
  }

  /* ---------------- router ---------------- */
  let route={ name:"overview", d:null };
  function go(name, d){ route={name, d:(d==null?null:d)}; render(); window.scrollTo(0,0); }
  function reset(){ route={name:"overview", d:null}; }
  function reload(){ state=load(); route={name:"overview", d:null}; }
  function render(){
    if(route.name==="day") renderDay();
    else if(route.name==="weeks") renderWeeks();
    else if(route.name==="settings") renderSettings();
    else renderOverview();
  }

  /* ---------------- OVERVIEW (week grid) ---------------- */
  function renderOverview(){
    const start=state.currentWeek;
    elBar.innerHTML=`
      ${homeBtnHTML("nnHome")}
      <h1>Nightly Numbers <span class="sub">Store ${esc(state.storeNumber||"84")}</span></h1>
      <button class="iconbtn" id="nnWeeks" aria-label="Weeks">📅</button>
      <button class="iconbtn" id="nnSettings" aria-label="Settings">⚙︎</button>`;
    elView.className="";

    // header row
    let head=`<th class="rowlbl">&nbsp;</th>`;
    for(let d=0; d<7; d++){
      head+=`<th class="day" data-d="${d}">${DAYS[d]}<span class="dn">${dayDate(start,d).getDate()}</span></th>`;
    }
    // body rows
    let body="";
    for(const r of ROWS){
      const sub=rowSub(r);
      body+=`<tr class="${r.calc?'nncalc':''}">`
          + `<td class="rowlbl">${esc(r.label)}${sub?`<small>${esc(sub)}</small>`:''}</td>`;
      for(let d=0; d<7; d++){
        const c=cellOf(r.key, d);
        let cls="nncell"+(c.blank?" future":"");
        if(c.goal==="good") cls+=" good"; else if(c.goal==="bad") cls+=" bad";
        if(c.sign==="pos") cls+=" pos"; else if(c.sign==="neg") cls+=" neg";
        const ddhint = (r.key==="dd" && c.dd!=null) ? `<span class="ddn"> (${c.dd})</span>` : "";
        body+=`<td class="${cls}" data-d="${d}">${esc(c.text)}${ddhint}</td>`;
      }
      body+=`</tr>`;
    }

    const enteredN=daysEnteredCount();
    elView.innerHTML=`
      <div class="nn-hd">
        <button class="nn-nav" id="nnPrev" aria-label="Previous week">‹</button>
        <div class="nn-hd-mid"><b>Week of ${esc(weekRangeLabel(start))}</b><small>${enteredN} of 7 days entered</small></div>
        <button class="nn-nav" id="nnNext" aria-label="Next week">›</button>
      </div>
      <div class="sched-scroll nn-scroll">
        <table class="sched nngrid">
          <thead><tr>${head}</tr></thead>
          <tbody>${body}</tbody>
        </table>
      </div>
      <div class="nn-legend">
        <span><i class="sw ent"></i>Entered</span>
        <span><i class="sw cal"></i>Calculated</span>
        <span><i class="sw gd"></i>Meets goal</span>
        <span><i class="sw bd"></i>Missed goal</span>
        <span class="nn-tap">Tap a day to enter numbers</span>
      </div>`;

    elFooter.innerHTML=`
      <div class="btn-row">
        <button class="btn ghost" id="nnProj">Set weekly projected</button>
        <button class="btn primary" id="nnExport">Export / Share &nbsp;→</button>
      </div>`;

    document.getElementById("nnHome").onclick=openHome;
    document.getElementById("nnWeeks").onclick=()=>go("weeks");
    document.getElementById("nnSettings").onclick=()=>go("settings");
    document.getElementById("nnPrev").onclick=()=>shiftWeek(-7);
    document.getElementById("nnNext").onclick=()=>shiftWeek(7);
    document.getElementById("nnProj").onclick=openWeeklyProjected;
    document.getElementById("nnExport").onclick=openExportChooser;
    elView.querySelectorAll("[data-d]").forEach(el=>{
      el.onclick=()=>go("day", Number(el.getAttribute("data-d")));
    });
  }
  function shiftWeek(deltaDays){
    const d=parseISO(state.currentWeek); d.setDate(d.getDate()+deltaDays);
    const mon=mondayISO(d);
    if(!state.weeks[mon]) state.weeks[mon]=blankWeek(mon);
    state.currentWeek=mon; save(); go("overview");
  }

  /* ---------------- SINGLE-DAY ENTRY ---------------- */
  // Numeric fields: tap → calculator numpad (decimal/±-aware). OTD is mm:ss text.
  const DAY_FIELDS = [
    { key:"netSales",     label:"Net Daily Sales",   money:true,  decimal:true  },
    { key:"manHours",     label:"Daily Man Hours",   decimal:true },
    { key:"laborDollars", label:"Labor $",           money:true,  decimal:true  },
    { key:"driverComp",   label:"Driver Comp $",     money:true,  decimal:true  },
    { key:"ddCount",      label:"DoorDash deliveries", decimal:false, dd:true },
    { key:"otd",          label:"OTD",               otd:true     },
    { key:"latePct",      label:"Late %",            decimal:true, pct:true },
    { key:"dailyCash",    label:"Daily Cash +/-",    money:true,  decimal:true, signed:true },
    { key:"lunchSales",   label:"Lunch Sales",       money:true,  decimal:true  },
  ];
  function fieldValStr(f){
    const dy=getDay(route.d);
    const v = dy? dy[f.key] : null;
    if(f.otd) return v? esc(v) : "—";
    if(v==null||v==="") return "—";
    if(f.dd){ return numStr(v)+` <span class="nnf-x">× $${money2(ddRate())} = $${money2((Number(v)||0)*ddRate())}</span>`; }
    if(f.money) return "$"+money2(v);
    if(f.pct) return numStr(v)+"%";
    return numStr(v);
  }
  function renderDay(){
    const d=route.d, start=state.currentWeek;
    const dt=dayDate(start,d);
    elBar.innerHTML=`
      <button class="iconbtn" id="nnBack" aria-label="Back">←</button>
      <h1>${DAYS_LONG[d]} <span class="sub">${MONTHS[dt.getMonth()]} ${dt.getDate()}</span></h1>`;
    elView.className="";

    // input cards
    let fields = DAY_FIELDS.map(f=>`
      <div class="nnf" data-k="${f.key}">
        <div class="nnf-l"><b>${esc(f.label)}</b>${ (f.key==="otd")?'<small>goal ≤ '+esc(state.goals.otd||"18:00")+'</small>' : (f.key==="latePct")?'<small>goal < '+(Number(state.goals.latePct)||8)+'%</small>' : '' }</div>
        ${ f.otd
            ? `<input class="nnf-otd" id="nnf-${f.key}" inputmode="numeric" placeholder="mm:ss" value="${esc((getDay(d)&&getDay(d).otd)||'')}">`
            : `<button class="nnf-v" id="nnf-${f.key}"><span class="num">${fieldValStr(f)}</span></button>` }
      </div>`).join("");

    // weekly projected (editable per day here)
    const ps=week().projected.sales[d], ph=week().projected.manHours[d];
    fields += `
      <div class="nn-subhd">Weekly projected (per day)</div>
      <div class="nnf" data-k="projSales">
        <div class="nnf-l"><b>Projected Sales</b></div>
        <button class="nnf-v" id="nnf-projSales"><span class="num">${ps==null?"—":("$"+numStr(ps))}</span></button>
      </div>
      <div class="nnf" data-k="projHours">
        <div class="nnf-l"><b>Projected Man Hours</b></div>
        <button class="nnf-v" id="nnf-projHours"><span class="num">${ph==null?"—":numStr(ph)}</span></button>
      </div>`;

    elView.innerHTML=`
      ${fields}
      <div class="nn-results" id="nnResults"></div>`;
    elFooter.innerHTML=`<button class="btn primary" id="nnDayDone">Done &nbsp;→</button>`;

    document.getElementById("nnBack").onclick=()=>go("overview");
    document.getElementById("nnDayDone").onclick=()=>go("overview");

    // wire numeric fields → numpad
    DAY_FIELDS.forEach(f=>{
      if(f.otd){
        const inp=document.getElementById("nnf-"+f.key);
        inp.oninput=()=>{ ensureDay(d).otd=inp.value.trim(); save(); refreshResults(); };
        return;
      }
      const btn=document.getElementById("nnf-"+f.key);
      btn.onclick=()=>{
        const dy=getDay(d); const cur=dy? dy[f.key] : null;
        openNumpad(f.label, cur, f.decimal!==false, v=>{
          const dd=ensureDay(d);
          dd[f.key] = (v===0 && cur==null && !f.signed) ? 0 : v; // keep explicit 0
          save();
          btn.querySelector(".num").innerHTML=fieldValStr(f);
          refreshResults();
        });
      };
    });
    // projected (per-day) numpad
    document.getElementById("nnf-projSales").onclick=()=>{
      const cur=week().projected.sales[d];
      openNumpad("Projected Sales", cur, true, v=>{ week().projected.sales[d]=v; save();
        document.querySelector("#nnf-projSales .num").innerHTML = v==null?"—":("$"+numStr(v)); refreshResults(); });
    };
    document.getElementById("nnf-projHours").onclick=()=>{
      const cur=week().projected.manHours[d];
      openNumpad("Projected Man Hours", cur, true, v=>{ week().projected.manHours[d]=v; save();
        document.querySelector("#nnf-projHours .num").textContent = v==null?"—":numStr(v); refreshResults(); });
    };

    refreshResults();
  }
  function refreshResults(){
    const d=route.d, host=document.getElementById("nnResults"); if(!host) return;
    const line=(lbl,val,cls)=>`<div class="nn-r"><span>${esc(lbl)}</span><b class="${cls||''}">${esc(val)}</b></div>`;
    const ddc = getDay(d)? (num(getDay(d).ddCount)||0) : 0;
    const tl  = totalLabor(getDay(d)||blankDay());
    const lp  = laborPct(d), lptd=laborPctToDate(d), ctd=cashToDate(d);
    let today=`<div class="nn-rhd">This day</div>`
      + line("Door Dash $", "$"+money2(ddc*ddRate()))
      + line("Sales to Date", "$"+money2(salesToDate(d)))
      + line("Total Labor $", "$"+money2(tl))
      + line("Total Labor $ to Date", "$"+money2(totalLaborToDate(d)))
      + line("Labor %", lp!=null? pctStr(lp):"—")
      + line("Labor % to Date", lptd!=null? pctStr(lptd):"—")
      + line("Total Cash +/-", signed(ctd), ctd>0?"pos":(ctd<0?"neg":""));
    let prior="";
    if(d>0 && entered(d-1)){
      const pc=cashToDate(d-1), pl=laborPctToDate(d-1);
      prior=`<div class="nn-rhd">Through ${esc(DAYS_LONG[d-1])} (prior)</div>`
        + line("Sales to Date", "$"+money2(salesToDate(d-1)))
        + line("Total Labor $ to Date", "$"+money2(totalLaborToDate(d-1)))
        + line("Labor % to Date", pl!=null? pctStr(pl):"—")
        + line("Total Cash +/-", signed(pc), pc>0?"pos":(pc<0?"neg":""));
    }
    host.innerHTML=today+prior;
  }

  /* ---------------- WEEKLY PROJECTED (bulk set all 7 days) ---------------- */
  function openWeeklyProjected(){
    const w=week();
    const firstNonNull=a=>{ for(const v of a) if(v!=null) return v; return ""; };
    overlayRoot.innerHTML=`
      <div class="overlay" id="nnProjOv">
        <div class="pad">
          <div class="padhead"><div class="l">Weekly projected · Week of ${esc(weekRangeLabel(state.currentWeek))}</div></div>
          <p class="nn-padp">Sets the value for all 7 days. Still editable per day.</p>
          <label class="nn-plbl">Projected Sales (all days)</label>
          <input class="schfield" id="nnProjSales" inputmode="decimal" placeholder="e.g. 1000" value="${esc(String(firstNonNull(w.projected.sales)))}">
          <label class="nn-plbl">Projected Man Hours (all days)</label>
          <input class="schfield" id="nnProjHours" inputmode="decimal" placeholder="e.g. 15" value="${esc(String(firstNonNull(w.projected.manHours)))}">
          <div class="btn-row" style="margin-top:6px">
            <button class="btn ghost" id="nnProjCancel">Cancel</button>
            <button class="btn primary" id="nnProjApply">Apply to week</button>
          </div>
        </div>
      </div>`;
    const close=()=>{ overlayRoot.innerHTML=""; };
    document.getElementById("nnProjOv").onclick=e=>{ if(e.target.id==="nnProjOv") close(); };
    document.getElementById("nnProjCancel").onclick=close;
    document.getElementById("nnProjApply").onclick=()=>{
      const sv=document.getElementById("nnProjSales").value.trim();
      const hv=document.getElementById("nnProjHours").value.trim();
      if(sv!==""){ const n=Number(sv); if(!isNaN(n)) w.projected.sales=Array(7).fill(n); }
      if(hv!==""){ const n=Number(hv); if(!isNaN(n)) w.projected.manHours=Array(7).fill(n); }
      save(); close(); toast("Weekly projected set"); renderOverview();
    };
  }

  /* ---------------- WEEKS (history / picker) ---------------- */
  function renderWeeks(){
    elBar.innerHTML=`
      <button class="iconbtn" id="nnBack" aria-label="Back">←</button>
      <h1>Weeks</h1>`;
    elView.className="";
    const keys=Object.keys(state.weeks).sort().reverse();
    let list="";
    for(const k of keys){
      const cur=k===state.currentWeek;
      let n=0; for(let d=0;d<7;d++){ const dy=state.weeks[k].days[d]; if(dy&&dy.netSales!=null) n++; }
      list+=`
        <div class="set-item" data-wk="${esc(k)}" style="${cur?'border-color:var(--accent2);':''}">
          <div class="top" style="margin:0;">
            <div style="flex:1;"><b style="font-size:15px;">Week of ${esc(weekRangeLabel(k))}</b>
              <small style="color:var(--muted);display:block;">${esc(k)} · ${n} of 7 entered${cur?' · current':''}</small></div>
            ${keys.length>1?`<button class="miniicon del wkdel" aria-label="Delete week">🗑</button>`:''}
          </div>
        </div>`;
    }
    elView.innerHTML=`
      ${list}
      <div class="setcard">
        <h3>Jump to week</h3>
        <p>Pick any date — it snaps to that week's Monday.</p>
        <input class="txt" type="date" id="nnNewWk" value="${esc(mondayOfToday())}">
        <div style="height:10px;"></div>
        <button class="btn primary" id="nnNewWkBtn">Go to week</button>
      </div>`;
    elFooter.innerHTML="";
    document.getElementById("nnBack").onclick=()=>go("overview");
    elView.querySelectorAll(".set-item[data-wk]").forEach(el=>{
      const k=el.getAttribute("data-wk");
      el.onclick=e=>{ if(e.target.closest(".wkdel")) return; state.currentWeek=k; save(); go("overview"); };
      const del=el.querySelector(".wkdel");
      if(del) del.onclick=()=>{
        if(confirm(`Delete Week of ${weekRangeLabel(k)}? This erases that week's numbers.`)){
          delete state.weeks[k];
          if(state.currentWeek===k) state.currentWeek=Object.keys(state.weeks).sort()[0]||mondayOfToday();
          if(!state.weeks[state.currentWeek]) state.weeks[state.currentWeek]=blankWeek(state.currentWeek);
          save(); renderWeeks();
        }
      };
    });
    document.getElementById("nnNewWkBtn").onclick=()=>{
      const raw=document.getElementById("nnNewWk").value;
      if(!raw){ toast("Pick a date"); return; }
      const mon=mondayISO(parseISO(raw));
      if(!state.weeks[mon]) state.weeks[mon]=blankWeek(mon);
      state.currentWeek=mon; save(); go("overview");
    };
  }

  /* ---------------- export (chooser → shareable image / printable PDF) ----------------
     Both ported verbatim from the locked mockups (export-mockup-numbers-*.html),
     bound to live data. Shareable: html2canvas → navigator.share (preview fallback).
     Printable: window.print() via the shared #hhPrintHost / @page letter portrait. */
  function expName(ext){ return "daily-numbers-"+state.currentWeek+"."+ext; }

  function cellHTMLx(cell, rowKey){            // shareable cell (red/gold; green/red goals)
    const cls=[];
    if(cell.blank) cls.push("future");
    if(cell.goal==="good") cls.push("good"); else if(cell.goal==="bad") cls.push("bad");
    if(cell.sign==="pos") cls.push("pos"); else if(cell.sign==="neg") cls.push("neg");
    let inner=esc(cell.text);
    if(rowKey==="dd" && !cell.blank && cell.dd!=null) inner+=`<span class="dd"> (${cell.dd})</span>`;
    return `<td${cls.length?` class="${cls.join(" ")}"`:""}>${inner}</td>`;
  }
  function cellHTMLp(cell, rowKey){            // printable cell (black ink; miss = grey+bold)
    const cls=[];
    if(cell.blank) cls.push("future");
    if(cell.goal==="bad") cls.push("miss");   // missed goal reads on B/W; "good" is unstyled
    const inner = cell.blank ? (rowKey==="lunch" ? "" : "—") : esc(cell.text);
    return `<td${cls.length?` class="${cls.join(" ")}"`:""}>${inner}</td>`;
  }
  function dayHeadHTML(d){
    return DAYS.map((dn,i)=>`<th>${dn}<span class="dn">${d.dates[i]}</span></th>`).join("");
  }
  function rowLabelHTML(r, ddhintCls){
    let extra="";
    if(r.key==="dd") extra=` <span class="${ddhintCls}">#×$${money2(ddRate())}</span>`;
    else if(r.sub) extra=` <small>${esc(r.sub)}</small>`;
    return esc(r.label)+extra;
  }

        <span><b>Door Dash $</b> = deliveries × $${money2(ddRate())}</span>
      </div>
      <div class="foot">

  function numbersPrintableHTML(d){
    const body=d.rows.map(r=>`
